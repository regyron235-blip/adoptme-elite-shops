<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Легендарні пети | AdoptMe Elite Shops</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <select id="currency-select">
      <option>UAH</option>
      <option>USD</option>
      <option>RUB</option>
      <option>EUR</option>
      <option>GBP</option>
      <option>PLN</option>
      <option>TRY</option>
      <option>KZT</option>
      <option>CHF</option>
      <option>JPY</option>
      <option>CAD</option>
      <option>AUD</option>
      <option>CNY</option>
      <option>SEK</option>
      <option>NOK</option>
      <option>DKK</option>
      <option>INR</option>
      <option>ILS</option>
      <option>HUF</option>
      <option>CZK</option>
      <option>ZAR</option>
      <option>SGD</option>
      <option>HKD</option>
      <option>MXN</option>
      <option>BRL</option>
      <option>SAR</option>
      <option>AED</option>
      <option>THB</option>
      <option>MYR</option>
      <option>IDR</option>
    </select>
    <input type="text" id="search-pet" placeholder="Пошук пета">
  </header>
  <main>
    <div class="pets-list" id="pets-list"></div>
  </main>
  <script>
    let pets = [];
    let selectedCurrency = "UAH";

    fetch('data/pets.json')
      .then(r => r.json())
      .then(data => {
        pets = data;
        renderPets();
      });

    function renderPets() {
      const list = document.getElementById('pets-list');
      const search = document.getElementById('search-pet').value.toLowerCase();
      list.innerHTML = "";
      pets.filter(pet => pet.name.toLowerCase().includes(search))
        .forEach(pet => {
          let price = pet.price[selectedCurrency] ?? "-";
          list.innerHTML += `
            <div class="pet-card">
              <img src="${pet.image}" alt="${pet.name}">
              <h3>${pet.name}</h3>
              <span class="rarity">${pet.rarity}</span>
              <div class="pet-price">${price} ${selectedCurrency}</div>
            </div>
          `;
        });
    }

    document.getElementById('currency-select').onchange = function() {
      selectedCurrency = this.value;
      renderPets();
    };
    document.getElementById('search-pet').oninput = renderPets;
  </script>
</body>
</html>
