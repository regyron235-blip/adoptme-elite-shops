<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EliteStore — Final Fixed</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #7d5fff 0%, #7158e2 100%);
            --bg-dark: #0b0e14;
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: var(--bg-dark); color: #fff; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border);
            padding: 25px; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; display: block; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; padding: 12px; border-bottom: 1px solid var(--glass-border); }
            .main { padding: 15px !important; display: block !important; }
            .grid { 
                display: grid !important; 
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; 
                gap: 12px !important; 
            }
            .card { padding: 15px !important; border-radius: 20px !important; }
            .card img { width: 100px !important; height: 100px !important; }
        }

        .logo {
            font-weight: 900; font-size: 24px; text-align: center; margin-bottom: 25px;
            background: linear-gradient(to right, #ff75c3, #ffa647);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border);
            padding: 12px 15px 12px 40px; border-radius: 12px; color: #fff; outline: none;
        }
        .search-box i { position: absolute; left: 15px; top: 14px; color: #7d5fff; }

        .nav-link {
            padding: 14px; border-radius: 12px; color: #94a3b8;
            text-decoration: none; font-weight: 700; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .nav-link.active { background: var(--accent); color: #fff; }

        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }

        /* КАРТКА (ТЕПЕР ПОВНІСТЮ КЛІКАБЕЛЬНА) */
        .card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 25px; text-align: center;
            position: relative; transition: 0.3s;
            cursor: pointer; transform-style: preserve-3d;
        }
        .card:hover { border-color: #7d5fff; background: rgba(125, 95, 255, 0.05); }

        .card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 10px; pointer-events: none; }
        .pet-name { font-size: 18px; font-weight: 800; margin-bottom: 15px; pointer-events: none; }

        .tg-btn {
            background: #0088cc; color: #fff; text-decoration: none;
            padding: 12px; width: 100%; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 800; font-size: 10px; text-transform: uppercase;
            pointer-events: none; /* Щоб клік проходив крізь кнопку на саму картку */
        }

        /* МОДАЛКА */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .support-modal { background: #111; padding: 40px; border-radius: 25px; text-align: center; position: relative; width: 90%; max-width: 400px; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #555; cursor: pointer; }

        .lang-switcher { margin-top: auto; display: flex; gap: 5px; justify-content: center; padding: 10px 0; }
        .l-btn { background: none; border: 1px solid #333; color: #555; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .l-btn.active { border-color: #7d5fff; color: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE <i class="fa-solid fa-gem"></i> STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" id="nav-all" onclick="clearSearch()"><i class="fa-solid fa-paw"></i> <span>Усі пети</span></div>
    <div class="nav-link" id="nav-sup" onclick="toggleSupport(true)"><i class="fa-solid fa-headset"></i> <span>Підтримка</span></div>

    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main"><div class="grid" id="catalog"></div></div>

<div class="modal-overlay" id="modalSupport">
    <div class="support-modal">
        <div class="close-x" onclick="toggleSupport(false)">✕</div>
        <h2 id="sup-title">ПІДТРИМКА</h2>
        <p id="sup-text" style="color:#8b949e; margin-bottom:25px;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn" style="pointer-events: auto;">
            <i class="fa-brands fa-telegram"></i> TELEGRAM
        </a>
    </div>
</div>

<script>
    const lang = {
        ua: { all: "Усі пети", sup: "Підтримка", buy: "написать по поводу продажи в tg", search: "Пошук...", supTitle: "ПІДТРИМКА", supText: "Є питання? Пишіть нам!" },
        ru: { all: "Все петы", sup: "Поддержка", buy: "написать по поводу продажи в tg", search: "Поиск...", supTitle: "ПОДДЕРЖКА", supText: "Есть вопросы? Пишите нам!" }
    };
    let cur = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            c.innerHTML += `
                <div class="card" onclick="window.open('https://t.me/your_tg', '_blank')">
                    <div style="color:#ff7675; font-size:9px; font-weight:900; margin-bottom:8px;">LEGENDARY</div>
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140'">
                    <div class="pet-name">${p.name}</div>
                    <div class="tg-btn">
                        <i class="fa-brands fa-telegram"></i> <span>${lang[cur].buy}</span>
                    </div>
                </div>`;
        });
        document.querySelector('#nav-all span').innerText = lang[cur].all;
        document.querySelector('#nav-sup span').innerText = lang[cur].sup;
        document.getElementById('searchInput').placeholder = lang[cur].search;
        document.getElementById('sup-title').innerText = lang[cur].supTitle;
        document.getElementById('sup-text').innerText = lang[cur].supText;
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function clearSearch() { document.getElementById('searchInput').value = ''; render(); }
    function toggleSupport(s) { document.getElementById('modalSupport').classList.toggle('active', s); }
    function setL(l) { cur = l; document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l)); render(); }

    // 3D ефект (ПК)
    document.addEventListener('mousemove', (e) => {
        if (window.innerWidth < 768) return;
        document.querySelectorAll('.card').forEach(card => {
            const r = card.getBoundingClientRect();
            const x = e.clientX - r.left;
            const y = e.clientY - r.top;
            if (x > 0 && x < r.width && y > 0 && y < r.height) {
                card.style.transform = `rotateX(${(r.height/2 - y)/15}deg) rotateY(${(x - r.width/2)/15}deg)`;
            } else { card.style.transform = `rotateX(0) rotateY(0)`; }
        });
    });

    render();
</script>
</body>
</html>
