<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — 3D Premium Edition</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #7d5fff 0%, #7158e2 100%);
            --bg-dark: #0b0e14;
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: var(--bg-dark); color: #fff; overflow: hidden;
            perspective: 1200px; /* Глибина для 3D */
        }

        /* SIDEBAR (Адаптивний) */
        .sidebar {
            width: 300px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border);
            padding: 30px; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; display: block; }
            .sidebar { 
                width: 100%; height: auto; position: sticky; top: 0; 
                padding: 15px; border-right: none; border-bottom: 1px solid var(--glass-border);
            }
            .main { padding: 20px 15px !important; display: block !important; overflow: visible !important; }
            .grid { display: flex !important; flex-direction: column !important; gap: 20px !important; width: 100% !important; }
            .card { width: 100% !important; transform: none !important; } /* Вимикаємо 3D на мобільних */
        }

        .logo {
            font-weight: 900; font-size: 26px; text-align: center; margin-bottom: 30px;
            background: linear-gradient(to right, #ff75c3, #ffa647);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 12px 15px 12px 40px; border-radius: 12px; color: #fff; outline: none;
        }
        .search-box i { position: absolute; left: 15px; top: 14px; color: #7d5fff; }

        .nav-link {
            padding: 12px; border-radius: 12px; color: #94a3b8;
            text-decoration: none; font-weight: 700; margin-bottom: 8px;
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* ГОЛОВНА СІТКА */
        .main { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        /* КАРТКА ПЕТА З 3D ЕФЕКТОМ */
        .card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 30px; text-align: center; cursor: pointer;
            position: relative; transition: transform 0.1s ease-out, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }
        
        .card:hover {
            border-color: #7d5fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card img { 
            width: 160px; height: 160px; object-fit: contain; margin-bottom: 15px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transform: translateZ(50px); /* Виносить пета вперед */
            pointer-events: none;
        }

        .pet-name { font-size: 20px; font-weight: 800; margin-bottom: 20px; transform: translateZ(30px); }

        .tg-btn {
            background: #0088cc; color: #fff; text-decoration: none;
            padding: 14px; width: 100%; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 800; font-size: 11px; text-transform: uppercase;
            transform: translateZ(40px); transition: 0.3s;
        }
        .tg-btn:hover { background: #00aaff; transform: translateZ(60px) scale(1.05); }

        /* МОВНИЙ ПЕРЕМИКАЧ */
        .lang-switcher { margin-top: auto; display: flex; gap: 8px; justify-content: center; padding: 15px 0; }
        .l-btn { background: none; border: 1px solid #333; color: #555; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .l-btn.active { border-color: #7d5fff; color: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE <i class="fa-solid fa-star"></i> STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" id="btn-all-txt"><i class="fa-solid fa-paw"></i> <span>Усі пети</span></div>
    <div class="nav-link" onclick="location.reload()" id="btn-sup-txt"><i class="fa-solid fa-headset"></i> <span>Підтримка</span></div>
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main"><div class="grid" id="catalog"></div></div>

<script>
    const lang = {
        ua: { all: "Усі пети", sup: "Підтримка", buy: "написать по поводу продажи в tg", search: "Пошук..." },
        ru: { all: "Все петы", sup: "Поддержка", buy: "написать по поводу продажи в tg", search: "Поиск..." }
    };
    let cur = 'ua';

    // Твій список петів (31 шт)
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            c.innerHTML += `
                <div class="card">
                    <div style="color:#ff7675; font-size:10px; font-weight:900; margin-bottom:10px;">LEGENDARY</div>
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/160'">
                    <div class="pet-name">${p.name}</div>
                    <a href="https://t.me/your_tg" target="_blank" class="tg-btn">
                        <i class="fa-brands fa-telegram"></i> <span>${lang[cur].buy}</span>
                    </a>
                </div>`;
        });
        document.querySelector('#btn-all-txt span').innerText = lang[cur].all;
        document.querySelector('#btn-sup-txt span').innerText = lang[cur].sup;
        document.getElementById('searchInput').placeholder = lang[cur].search;
    }

    // МАГІЯ 3D НАХИЛУ
    document.addEventListener('mousemove', (e) => {
        if (window.innerWidth < 768) return; // Не працює на телефонах
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (centerY - y) / 10;
                const rotateY = (x - centerX) / 10;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            } else {
                card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            }
        });
    });

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) { cur = l; document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l)); render(); }

    render();
</script>
</body>
</html>
