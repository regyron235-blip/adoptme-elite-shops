<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Gradient Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px; background: #0d1117; border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 100;
        }

        .logo {
            font-weight: 900; font-size: 24px; text-align: center; margin-bottom: 40px;
            background: linear-gradient(90deg, #a29bfe, #6c5ce7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input {
            width: 100%; background: #05060a; border: 1px solid var(--glass-border);
            padding: 14px 14px 14px 45px; border-radius: 12px; color: #fff;
        }
        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--accent-solid); }

        .nav-link {
            padding: 15px 20px; border-radius: 12px; color: #8b949e;
            text-decoration: none; font-weight: 700; margin-bottom: 10px;
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s;
        }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* GRID & CARDS */
        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 30px; text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #6c5ce7;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.2);
        }

        .card img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px; }

        .rarity { 
            color: #ff7675; font-size: 10px; font-weight: 900; 
            letter-spacing: 2px; margin-bottom: 4px; text-transform: uppercase;
        }

        /* ПОХОДЖЕННЯ */
        .origin {
            font-size: 11px; color: #8b949e; margin-bottom: 15px;
            font-weight: 600; text-transform: uppercase; opacity: 0.8;
        }

        .pet-name { font-size: 20px; font-weight: 900; margin-bottom: 20px; letter-spacing: -0.5px; }

        .tg-btn {
            background: #0088cc; color: #fff; text-decoration: none;
            padding: 15px; width: 100%; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 800; font-size: 11px; text-transform: uppercase;
            transition: 0.3s;
        }
        .tg-btn:hover { background: #00aaff; transform: scale(1.02); }

        /* LANG */
        .lang-switcher { margin-top: auto; display: flex; gap: 8px; justify-content: center; padding-top: 20px; }
        .l-btn { background: #161b22; border: 1px solid var(--glass-border); color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .l-btn.active { border-color: var(--accent-solid); color: var(--accent-solid); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; padding: 15px; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE <i class="fa-solid fa-gem"></i> STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" id="btn-all-txt"><i class="fa-solid fa-paw"></i> <span>Усі пети</span></div>
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<script>
    const lang = {
        ua: { all: "Усі пети", sell: "По поводу продажи написать нам в тг", origin: "Походження: Adopt Me" },
        ru: { all: "Все петы", sell: "По поводу продажи написать нам в тг", origin: "Происхождение: Adopt Me" }
    };
    let cur = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        document.querySelector('#btn-all-txt span').innerText = lang[cur].all;
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="rarity">LEGENDARY</div>
                <div class="origin">${lang[cur].origin}</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150/161b22/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-btn">
                    <i class="fa-brands fa-telegram"></i> <span>${lang[cur].sell}</span>
                </a>
            `;
            c.appendChild(card);
        });
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        cur = l;
        document.getElementById('btn-ua').classList.toggle('active', l === 'ua');
        document.getElementById('btn-ru').classList.toggle('active', l === 'ru');
        render();
    }

    render();
</script>
</body>
</html>
