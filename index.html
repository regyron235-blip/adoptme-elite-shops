<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me Elite Shop — Магазин редких петтов</title>
    <meta name="description" content="Лучший магазин редких животных в Адопт Ми. Купить Shadow Dragon, Frost Dragon и других по низким ценам.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Adopt Me Elite Shop</h1>
        <p>Полный каталог всех питомцев</p>
        <input type="text" id="searchInput" placeholder="Введите название питомца для поиска...">
    </header>

    <main id="petContainer" class="pets-container">
        </main>

    <footer>
        <p>Powered by Gradients | Adopt Me Elite Store 2026</p>
    </footer>

    <script>
        // Твій список петів (можеш додавати нових сюди)
        const petData = [
            { name: "Shadow Dragon", rarity: "Legendary", img: "https://vignette.wikia.nocookie.net/adoptme/images/0/0b/Shadow_Dragon.png" },
            { name: "Frost Dragon", rarity: "Legendary", img: "https://vignette.wikia.nocookie.net/adoptme/images/d/d3/Frost_Dragon.png" },
            { name: "Bat Dragon", rarity: "Legendary", img: "https://vignette.wikia.nocookie.net/adoptme/images/a/a2/Bat_Dragon.png" },
            { name: "Giraffe", rarity: "Legendary", img: "https://vignette.wikia.nocookie.net/adoptme/images/1/13/Giraffe.png" },
            { name: "Owl", rarity: "Legendary", img: "https://vignette.wikia.nocookie.net/adoptme/images/0/0c/Owl.png" }
        ];

        const container = document.getElementById('petContainer');
        const searchInput = document.getElementById('searchInput');

        function displayPets(filter = "") {
            container.innerHTML = "";
            const filtered = petData.filter(pet => pet.name.toLowerCase().includes(filter.toLowerCase()));
            
            filtered.forEach(pet => {
                const card = document.createElement('div');
                card.className = 'pet-card';
                card.innerHTML = `
                    <h3>${pet.name}</h3>
                    <img src="${pet.img}" alt="${pet.name}">
                    <p>${pet.rarity}</p>
                    <button onclick="window.location.href='https://t.me/твій_нік'">КУПИТЬ</button>
                `;
                container.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => displayPets(e.target.value));
        displayPets();
    </script>
</body>
</html>
