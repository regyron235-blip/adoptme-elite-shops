<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Mobile Optimized</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #7d5fff 0%, #7158e2 100%);
            --card-grad: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            --bg: #0b0e14;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: var(--bg); color: #fff; overflow: hidden;
        }

        /* Адаптивний SIDEBAR */
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(50px); border-right: 1px solid var(--glass-border);
            padding: 30px; display: flex; flex-direction: column; z-index: 100;
            flex-shrink: 0;
        }

        /* Стилі для телефонів */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { 
                width: 100%; height: auto; border-right: none; 
                border-bottom: 1px solid var(--glass-border); padding: 20px;
                position: sticky; top: 0;
            }
            .logo { margin-bottom: 15px !important; font-size: 22px !important; }
            .search-box { margin-bottom: 15px !important; }
            .nav-link { padding: 10px 15px !important; font-size: 14px; }
            .main { padding: 20px !important; height: auto; overflow: visible; }
            .info-panel { width: 100% !important; right: -100% !important; }
        }

        .logo {
            font-weight: 900; font-size: 28px; text-align: center; margin-bottom: 40px;
            background: linear-gradient(to right, #ff75c3, #ffa647);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-box { position: relative; margin-bottom: 30px; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 12px 20px 12px 45px; border-radius: 12px; color: #fff;
        }
        .search-box i { position: absolute; left: 15px; top: 15px; color: #7d5fff; }

        .nav-link {
            padding: 15px 20px; border-radius: 15px; color: #94a3b8;
            text-decoration: none; font-weight: 700; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .nav-link.active { background: var(--accent); color: #fff; }

        .main { flex: 1; overflow-y: auto; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

        .card {
            background: var(--card-grad); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 25px; text-align: center; cursor: pointer;
        }
        .card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }
        .pet-name { font-size: 18px; font-weight: 800; margin-bottom: 15px; }

        .tg-btn {
            background: #0088cc; color: #fff; text-decoration: none;
            padding: 12px; width: 100%; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 800; font-size: 12px; text-transform: uppercase;
        }

        .info-panel {
            position: fixed; right: -450px; top: 0; width: 400px; height: 100%;
            background: #0b0e14; border-left: 1px solid var(--glass-border); z-index: 1000;
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }
        .info-panel.active { right: 0; }
        .close-info { align-self: flex-end; cursor: pointer; font-size: 24px; }

        .lang-switcher { margin-top: auto; display: flex; gap: 10px; justify-content: center; padding: 15px 0; }
        .l-btn { background: none; border: 1px solid #333; color: #555; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        .l-btn.active { border-color: #7d5fff; color: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE <i class="fa-solid fa-star"></i> STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" id="btn-all-txt"><i class="fa-solid fa-paw"></i> <span>Усі пети</span></div>
    <div class="nav-link" onclick="openSupport()" id="btn-sup-txt"><i class="fa-solid fa-headset"></i> <span>Підтримка</span></div>
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main"><div class="grid" id="catalog"></div></div>

<div class="info-panel" id="infoPanel">
    <div class="close-info" onclick="closeInfo()">✕</div>
    <img src="" id="infoImg" style="width:200px; margin: 20px 0;">
    <div style="text-align:center; width:100%;">
        <p style="color:#94a3b8; font-size:12px; margin:0;">RARITY</p>
        <p style="font-size:20px; font-weight:900; color:#ff7675; margin:5px 0 20px;">Legendary</p>
        <p style="color:#94a3b8; font-size:12px; margin:0;" id="lbl-origin">ORIGIN</p>
        <p id="infoOrigin" style="font-size:18px; font-weight:800; margin:5px 0;"></p>
    </div>
    <a href="https://t.me/your_tg" target="_blank" class="tg-btn" style="margin-top:auto; padding:18px;" id="panel-buy-btn">
        <i class="fa-brands fa-telegram"></i> <span></span>
    </a>
</div>

<script>
    const lang = {
        ua: { all: "Усі пети", sup: "Підтримка", buy: "написать по поводу продажи в tg", search: "Пошук...", origin: "ПОХОДЖЕННЯ" },
        ru: { all: "Все петы", sup: "Поддержка", buy: "написать по поводу продажи в tg", search: "Поиск...", origin: "ПРОИСХОЖДЕНИЕ" }
    };
    let cur = 'ua';

    // Твій список петів
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png", origin: "Halloween 2019" },
        { name: "Frost Dragon", img: "frost_dragon.png", origin: "Christmas 2019" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png", origin: "Leaf 2022" },
        { name: "Albino Monkey", img: "albino_monkey.png", origin: "Monkey Fairground" },
        { name: "Monkey King", img: "monkey_king.png", origin: "Monkey Fairground" },
        { name: "Axolotl", img: "axolotl.png", origin: "Robux Pet" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png", origin: "April Fools 2022" },
        { name: "Cerberus", img: "cerberus.png", origin: "Halloween 2020" },
        { name: "Cobra", img: "cobra.png", origin: "Premium Pet" },
        { name: "Dodo", img: "dodo.png", origin: "Fossil Egg" },
        { name: "Diamond Dragon", img: "diamond_dragon.png", origin: "Diamond Egg" },
        { name: "Diamond Griffin", img: "diamond_griffin.png", origin: "Diamond Egg" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png", origin: "Diamond Egg" },
        { name: "Golden Dragon", img: "golden_dragon.png", origin: "Golden Egg" },
        { name: "Golden Griffin", img: "golden_griffin.png", origin: "Golden Egg" },
        { name: "Golden Unicorn", img: "golden_unicorn.png", origin: "Golden Egg" },
        { name: "Goldhorn", img: "goldhorn.png", origin: "Mythic Egg" },
        { name: "Guardian Lion", img: "guardian_lion.png", origin: "Lunar New Year 2021" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png", origin: "Halloween 2023" },
        { name: "King Bee", img: "king_bee.png", origin: "Honey Pot" },
        { name: "Kitsune", img: "kitsune.png", origin: "Robux Pet" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png", origin: "Lunar 2024" },
        { name: "Octopus", img: "octopus.png", origin: "Ocean Egg" },
        { name: "Peacock", img: "peacock.png", origin: "Robux Pet" },
        { name: "Phoenix", img: "phoenix.png", origin: "Mythic Egg" },
        { name: "Queen Bee", img: "queen_bee.png", origin: "Honey Pot" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png", origin: "Rain 2023" },
        { name: "Robo Dog", img: "robo_dog.png", origin: "Robux Pet" },
        { name: "Shark", img: "shark.png", origin: "Ocean Egg" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png", origin: "Space Event" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png", origin: "Summerfest 2024" },
        { name: "T-Rex", img: "trex.png", origin: "Fossil Egg" }
    ];

    function render(data = pets) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            c.innerHTML += `
                <div class="card" onclick="openInfo('${p.name}')">
                    <div style="color:#ff7675; font-size:10px; font-weight:900; margin-bottom:10px;">LEGENDARY</div>
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140'">
                    <div class="pet-name">${p.name}</div>
                    <a href="https://t.me/your_tg" target="_blank" class="tg-btn" onclick="event.stopPropagation()">
                        <i class="fa-brands fa-telegram"></i> <span>${lang[cur].buy}</span>
                    </a>
                </div>`;
        });
        document.querySelector('#btn-all-txt span').innerText = lang[cur].all;
        document.querySelector('#btn-sup-txt span').innerText = lang[cur].sup;
        document.getElementById('searchInput').placeholder = lang[cur].search;
        document.getElementById('lbl-origin').innerText = lang[cur].origin;
        document.querySelector('#panel-buy-btn span').innerText = lang[cur].buy;
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function openInfo(name) {
        const p = pets.find(x => x.name === name);
        document.getElementById('infoImg').src = p.img;
        document.getElementById('infoOrigin').innerText = p.origin;
        document.getElementById('infoPanel').classList.add('active');
    }

    function closeInfo() { document.getElementById('infoPanel').classList.remove('active'); }
    function setL(l) { cur = l; document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l)); render(); }

    render();
</script>
</body>
</html>
