<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Premium Adopt Me Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #7d5fff 0%, #7158e2 100%);
            --card-grad: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            --bg: #0b0e14;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Плавний скрол та база */
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: var(--bg); color: #fff; overflow: hidden;
        }

        /* SIDEBAR з блюром */
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(50px); border-right: 1px solid var(--glass-border);
            padding: 40px; display: flex; flex-direction: column; z-index: 100;
        }

        .logo {
            font-weight: 900; font-size: 28px; 
            background: linear-gradient(to right, #ff75c3, #ffa647);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 60px; text-align: center; letter-spacing: 2px;
        }

        .nav-link {
            padding: 18px 25px; border-radius: 20px; color: #94a3b8;
            text-decoration: none; font-weight: 700; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            border: 1px solid transparent;
        }
        .nav-link i { font-size: 20px; }
        .nav-link.active { 
            background: var(--accent); color: #fff; 
            box-shadow: 0 15px 35px rgba(125, 95, 255, 0.3);
        }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.05); color: #fff; }

        .nav-link.support { margin-top: auto; border: 1px solid #7d5fff; color: #7d5fff; }
        .nav-link.support:hover { background: #7d5fff; color: #fff; }

        /* ОСНОВНА СІТКА */
        .main { flex: 1; overflow-y: auto; padding: 60px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; }

        /* ПРОФЕСІЙНА КАРТКА ПЕТА */
        .card {
            background: var(--card-grad); border: 1px solid var(--glass-border);
            border-radius: 45px; padding: 40px; text-align: center;
            position: relative; overflow: hidden;
            animation: fadeIn 0.8s ease backwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(125, 95, 255, 0.5);
            background: linear-gradient(145deg, rgba(125, 95, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .card img { 
            width: 180px; height: 180px; object-fit: contain; 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
            margin-bottom: 25px;
        }
        
        .rarity { 
            background: rgba(255, 118, 117, 0.1); color: #ff7675;
            padding: 6px 15px; border-radius: 12px; font-size: 10px;
            font-weight: 900; display: inline-block; margin-bottom: 15px;
        }

        .pet-name { font-size: 24px; font-weight: 900; margin-bottom: 25px; letter-spacing: -0.5px; }

        /* КНОПКА КУПІВЛІ (TELEGRAM) */
        .tg-buy-btn {
            background: #0088cc; color: #fff; text-decoration: none;
            padding: 18px; width: 100%; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 800; font-size: 14px; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.2);
        }
        .tg-buy-btn:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(0, 136, 204, 0.4); }

        /* МОВНИЙ ПЕРЕМИКАЧ */
        .lang-switcher { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        .l-btn { 
            background: none; border: 1px solid #444; color: #666; 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 700;
        }
        .l-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }

        /* МОДАЛКА */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: #111; border: 1px solid var(--glass-border);
            width: 90%; max-width: 500px; border-radius: 40px; padding: 50px; text-align: center;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE <i class="fa-solid fa-gem"></i> STORE</div>
    <div class="nav-link active" id="menu-all">
        <i class="fa-solid fa-layer-group"></i> <span>Усі пети</span>
    </div>
    
    <div class="nav-link support" onclick="openSupport()" id="menu-sup">
        <i class="fa-solid fa-headset"></i> <span>Підтримка</span>
    </div>
    
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="supportModal" onclick="if(event.target==this) closeSupport()">
    <div class="modal">
        <h2 id="sup-title" style="font-size: 32px; margin-bottom: 20px;"></h2>
        <p id="sup-text" style="color: #94a3b8; font-size: 18px; margin-bottom: 35px;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-buy-btn" style="padding: 22px;">
            <i class="fa-brands fa-telegram" style="font-size: 24px;"></i> НАПИСАТИ В TG
        </a>
    </div>
</div>

<script>
    const lang = {
        ua: {
            all: "Усі пети", sup: "Підтримка", buy: "Написати для продажі",
            supTitle: "Потрібна допомога?", 
            supText: "Наші менеджери готові відповісти на будь-які ваші запитання в Telegram!"
        },
        ru: {
            all: "Все петы", sup: "Поддержка", buy: "Написать для продажи",
            supTitle: "Нужна помощь?", 
            supText: "Наши менеджеры готовы ответить на любые ваши вопросы в Telegram!"
        }
    };

    let cur = 'ua';

    // Список 31 пета
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render() {
        document.querySelector('#menu-all span').innerText = lang[cur].all;
        document.querySelector('#menu-sup span').innerText = lang[cur].sup;

        const c = document.getElementById('catalog');
        c.innerHTML = '';
        pets.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = (index * 0.05) + 's';
            card.innerHTML = `
                <div class="rarity">LEGENDARY</div>
                <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/180?text=Pet'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-buy-btn">
                    <i class="fa-brands fa-telegram"></i> ${lang[cur].buy}
                </a>
            `;
            c.appendChild(card);
        });
    }

    function openSupport() {
        document.getElementById('sup-title').innerText = lang[cur].supTitle;
        document.getElementById('sup-text').innerText = lang[cur].supText;
        document.getElementById('supportModal').style.display = 'flex';
    }

    function closeSupport() { document.getElementById('supportModal').style.display = 'none'; }

    function setL(l) { 
        cur = l; 
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        render(); 
    }

    render();
</script>
</body>
</html>
