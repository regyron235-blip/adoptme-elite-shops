<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Adopt Me</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: #fff;
            display: flex; height: 100vh; overflow: hidden;
        }

        .sidebar {
            width: 300px; background: #0d1117; border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 1000;
        }

        .logo { 
            font-weight: 900; font-size: 24px; text-align: center; margin-bottom: 40px; 
            background: linear-gradient(90deg, #a29bfe, #6c5ce7); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { 
            width: 100%; background: #05060a; border: 1px solid var(--glass-border); 
            padding: 12px 12px 12px 40px; border-radius: 12px; color: #fff; outline: none; 
        }
        .search-box i { position: absolute; left: 15px; top: 14px; color: var(--accent-solid); }

        .nav-link { 
            padding: 15px 20px; border-radius: 12px; color: #8b949e; 
            text-decoration: none; font-weight: 700; margin-bottom: 10px; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        .lang-switcher { margin-top: auto; display: flex; gap: 10px; padding-top: 20px; }
        .l-btn { background: #161b22; border: 1px solid var(--glass-border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: 700; }
        .l-btn.active { background: var(--accent-solid); }

        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            border-radius: 30px; padding: 25px; text-align: center; transition: 0.4s; cursor: pointer;
        }
        .card:hover { transform: translateY(-10px); border-color: #6c5ce7; }
        .card img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; }
        .pet-name { font-weight: 900; margin-bottom: 15px; font-size: 14px; height: 35px; display: flex; align-items: center; justify-content: center; }

        .tg-btn { 
            background: #0088cc; color: #fff !important; text-decoration: none; 
            padding: 12px; width: 100%; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            font-weight: 800; font-size: 11px; text-transform: uppercase; 
        }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; 
            z-index: 2000; backdrop-filter: blur(10px); 
        }
        .modal { 
            background: #161b22; color: #fff; width: 90%; max-width: 400px; 
            border-radius: 35px; padding: 40px; position: relative; text-align: center; 
            border: 1px solid var(--glass-border); 
        }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #8b949e; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" onclick="render(pets)"><span>Усі пети</span></div>
    <div class="nav-link" style="border: 1px solid #6c5ce7; color: #6c5ce7;" onclick="openSupport()">
        <i class="fa-solid fa-headset"></i> <span id="side-sup">Підтримка</span>
    </div>
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="ua-btn" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="ru-btn" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="supportOverlay" onclick="if(event.target==this) closeSupport()">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closeSupport()"></i>
        <div style="font-size: 50px; color: #6c5ce7; margin-bottom: 20px;"><i class="fa-solid fa-circle-question"></i></div>
        <h2 id="sup-title" style="margin-bottom: 20px;">Виникли питання?</h2>
        <p id="sup-desc" style="color: #fff; margin-bottom: 25px; font-weight: 700;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn">
            <i class="fa-brands fa-telegram"></i> <span>ПРОДАТЬ</span>
        </a>
    </div>
</div>

<script>
    const lang = {
        ua: { sell: "ПРОДАТЬ", search: "Пошук...", msg: "напишіть нам і ми допоможемо вас з нашою проблемою" },
        ru: { sell: "ПРОДАТЬ", search: "Поиск...", msg: "напишите нам и мы поможем вас с нашей проблемой" }
    };

    let cur = 'ua';

    const pets = [
        // Пети з pets.3 (24 шт)
        { name: "Strawberry Shortcake Bat Dragon", file: "pets.3/winter_2022_strawberry_shortcake_bat_dragon.png" },
        { name: "Billy Goat", file: "pets.3/urban_2023_billy_goat.png" },
        { name: "Ice Moth Dragon", file: "pets.3/winter_2022_ice_moth_dragon.png" },
        { name: "Leviathan", file: "pets.3/summerfest_2023_leviathan.png" },
        { name: "Naga Dragon", file: "pets.3/seasia_2023_naga_dragon.png" },
        { name: "Tree Kangaroo", file: "pets.3/seasia_2023_tree_kangaroo.png" },
        { name: "Winged Horse", file: "pets.3/random_pets_2022_winged_horse.png" },
        { name: "Sugar Glider", file: "pets.3/easter_2022_sugar_glider.png" },
        { name: "Dancing Dragon", file: "pets.3/lny_2022_dragon.png" },
        { name: "Ghost Dragon", file: "pets.3/halloween_2021_ghost_dragon.png" },
        { name: "Lava Dragon", file: "pets.3/halloween_2022_lava_dragon.png" },
        { name: "Alicorn", file: "pets.3/basic_egg_2022_alicron.png" },
        { name: "Ancient Dragon", file: "pets.3/basic_egg_2022_ancient_dragon.png" },
        { name: "Mechapup", file: "pets.3/april_fools_2022_mechapup.png" },
        { name: "Arctic Reindeer", file: "pets.3/arctic_reindeer.png" },
        { name: "Bat Dragon", file: "pets.3/bat_dragon.png" },
        { name: "Crow", file: "pets.3/crow.png" },
        { name: "Evil Unicorn", file: "pets.3/evil_unicorn.png" },
        { name: "Frost Fury", file: "pets.3/frost_fury.png" },
        { name: "Giraffe", file: "pets.3/giraffe.png" },
        { name: "Owl", file: "pets.3/owl.png" },
        { name: "Parrot", file: "pets.3/parrot.png" },
        { name: "Skele-Rex", file: "pets.3/skele_rex.png" },
        { name: "Snow Owl", file: "pets.3/snow_owl.png" },
        // Основні пети (31 шт)
        { name: "Shadow Dragon", file: "shadow_dragon.png" },
        { name: "Frost Dragon", file: "frost_dragon.png" },
        { name: "Diamond Butterfly", file: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", file: "albino_monkey.png" },
        { name: "Monkey King", file: "monkey_king.png" },
        { name: "Axolotl", file: "axolotl.png" },
        { name: "Cerberus", file: "cerberus.png" },
        { name: "Cobra", file: "cobra.png" },
        { name: "Dodo", file: "dodo.png" },
        { name: "Diamond Dragon", file: "diamond_dragon.png" },
        { name: "Diamond Griffin", file: "diamond_griffin.png" },
        { name: "Diamond Unicorn", file: "diamond_unicorn.png" },
        { name: "Golden Dragon", file: "golden_dragon.png" },
        { name: "Golden Griffin", file: "golden_griffin.png" },
        { name: "Golden Unicorn", file: "golden_unicorn.png" },
        { name: "Goldhorn", file: "goldhorn.png" },
        { name: "Guardian Lion", file: "guardian_lion.png" },
        { name: "Vampire Dragon", file: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", file: "king_bee.png" },
        { name: "Kitsune", file: "kitsune.png" },
        { name: "Midnight Dragon", file: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", file: "octopus.png" },
        { name: "Peacock", file: "peacock.png" },
        { name: "Phoenix", file: "phoenix.png" },
        { name: "Queen Bee", file: "queen_bee.png" },
        { name: "Diamond Amazon", file: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", file: "robo_dog.png" },
        { name: "Shark", file: "shark.png" },
        { name: "Capricorn", file: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", file: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", file: "trex.png" }
    ];

    function render(data) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${p.file}" onerror="this.src='https://via.placeholder.com/120/161b22/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-btn">
                    <i class="fa-brands fa-telegram"></i> ${lang[cur].sell}
                </a>
            `;
            c.appendChild(card);
        });
    }

    function openSupport() {
        document.getElementById('sup-desc').innerText = lang[cur].msg;
        document.getElementById('supportOverlay').style.display = 'flex';
    }

    function closeSupport() { document.getElementById('supportOverlay').style.display = 'none'; }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        cur = l;
        document.getElementById('ua-btn').classList.toggle('active', l === 'ua');
        document.getElementById('ru-btn').classList.toggle('active', l === 'ru');
        render(pets);
    }

    render(pets);
</script>
</body>
</html>
