<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Fixed Cards</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #7d5fff;
            --color2: #ff4dff;
            --bg: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg); color: white; min-height: 100vh;
        }

        /* ФОН */
        .bg-wrapper {
            position: fixed; inset: 0; z-index: -1; background: #000; overflow: hidden;
        }
        .blob {
            position: absolute; width: 600px; height: 600px; filter: blur(120px);
            border-radius: 50%; opacity: 0.3; background: var(--color1);
            animation: move 15s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        /* HEADER */
        .header { padding: 40px 20px; text-align: center; }
        h1 {
            font-size: clamp(40px, 8vw, 70px); margin-bottom: 25px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .controls {
            max-width: 500px; margin: 0 auto 40px; display: flex; flex-direction: column; gap: 15px;
        }

        .search-box { position: relative; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 15px 15px 45px; border-radius: 12px; color: #fff; outline: none;
        }
        .search-box i { position: absolute; left: 15px; top: 16px; color: var(--color1); }

        .btn-row { display: flex; justify-content: center; gap: 10px; }
        .btn-ui {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer;
            font-weight: 900; font-size: 11px; text-transform: uppercase;
        }
        .btn-ui.active { background: var(--color1); border-color: var(--color1); }

        /* КАРТКИ */
        .main { padding: 0 20px 60px; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            z-index: 1;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--color2); background: rgba(255, 255, 255, 0.06); }

        .card img {
            width: 140px; height: 140px; object-fit: contain;
            margin-bottom: 15px; pointer-events: none; /* Щоб картинка не заважала кліку */
        }

        .rarity { color: var(--color2); font-size: 9px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
        .pet-name { font-size: 17px; font-weight: 900; margin-bottom: 20px; color: #fff; }

        /* КНОПКА */
        .tg-button {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #7d5fff, #ff4dff);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            z-index: 10; /* Найвищий пріоритет кліку */
            transition: 0.3s;
        }
        .tg-button:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(125, 95, 255, 0.4); }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-box { background: #111; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid #333; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="bg-wrapper"><div class="blob"></div></div>

    <div class="header">
        <h1>ELITE STORE</h1>
        <div class="controls">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
            </div>
            <div class="btn-row">
                <button class="btn-ui" onclick="toggleM(true)" id="supBtn">Підтримка</button>
                <button class="btn-ui active" onclick="setL('ua')" id="uaBtn">UA</button>
                <button class="btn-ui" onclick="setL('ru')" id="ruBtn">RU</button>
            </div>
        </div>
    </div>

    <div class="main"><div class="grid" id="catalog"></div></div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 id="mTitle" style="margin-bottom: 10px;">SUPPORT</h2>
            <p id="mText" style="color: #888; margin-bottom: 25px;">Пишіть нам в Telegram</p>
            <a href="https://t.me/your_tg" target="_blank" class="tg-button">Telegram</a>
            <div onclick="toggleM(false)" style="margin-top: 20px; cursor: pointer; color: #444; font-size: 11px;">ЗАКРИТИ</div>
        </div>
    </div>

<script>
    const lang = {
        ua: { search: "Пошук...", support: "Підтримка", buy: "По поводу продажи написать нам в тг", mTitle: "ПІДТРИМКА", mText: "Є питання? Пиши нам!" },
        ru: { search: "Поиск...", support: "Поддержка", buy: "По поводу продажи написать нам в тг", mTitle: "ПОДДЕРЖКА", mText: "Есть вопросы? Пиши нам!" }
    };
    let curL = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        const cat = document.getElementById('catalog');
        cat.innerHTML = '';
        data.forEach(p => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
                <div class="rarity">LEGENDARY ITEM</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140/111/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-button">${lang[curL].buy}</a>
            `;
            cat.appendChild(d);
        });
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        curL = l;
        document.getElementById('uaBtn').classList.toggle('active', l === 'ua');
        document.getElementById('ruBtn').classList.toggle('active', l === 'ru');
        document.getElementById('searchInput').placeholder = lang[l].search;
        document.getElementById('supBtn').innerText = lang[l].support;
        document.getElementById('mTitle').innerText = lang[l].mTitle;
        document.getElementById('mText').innerText = lang[l].mText;
        render();
    }

    function toggleM(s) { document.getElementById('modal').classList.toggle('active', s); }

    render();
</script>
</body>
</html>
