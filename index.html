<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me Elite — Скупка легендарок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">🐾 EliteStore</div>
        <nav>
            <a href="#" onclick="displayPets('')">🏠 Все петы</a>
            <a href="#" onclick="displayPets('Legendary')">🔥 Легендарные</a>
            <a href="#" onclick="displayPets('Ultra-Rare')">✨ Ультра-редкие</a>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Скупка питомцев Adopt Me</h1>
            <p>Выбери легендарного питомца, которого хочешь продать</p>
            <input type="text" id="searchInput" placeholder="Поиск питомца по названию...">
        </header>
        <main id="petContainer" class="pets-grid"></main>
    </div>

    <script>
        const petData = [
            // ТВОЇ ПЕРШІ ПЕТИ (З ОНОВЛЕНИМИ НАЗВАМИ З GITHUB)
            { name: "Shadow Dragon", rarity: "Legendary", img: "shadow_dragon.png" },
            { name: "Frost Dragon", rarity: "Legendary", img: "frost_dragon.png" },
            { name: "Bat Dragon", rarity: "Legendary", img: "bat_dragon.png" },
            { name: "Giraffe", rarity: "Legendary", img: "giraffe.png" },
            { name: "Owl", rarity: "Legendary", img: "owl.png" },
            { name: "Parrot", rarity: "Legendary", img: "parrot.png" },
            { name: "Evil Unicorn", rarity: "Legendary", img: "evil_unicorn.png" },
            { name: "Crow", rarity: "Legendary", img: "crow.png" },
            { name: "Turtle", rarity: "Legendary", img: "turtle.png" },
            { name: "Kangaroo", rarity: "Legendary", img: "kangaroo.png" },
            { name: "Frost Fury", rarity: "Legendary", img: "frost_fury.png" },
            { name: "Arctic Reindeer", rarity: "Legendary", img: "arctic_reindeer.png" },
            { name: "Albino Monkey", rarity: "Legendary", img: "albino_monkey.png" },
            { name: "Monkey King", rarity: "Legendary", img: "monkey_king.png" },
            { name: "Diamond Butterfly", rarity: "Legendary", img: "sanctuary_2022_diamond_premium_butterfly.png" },
            { name: "SS Bat Dragon", rarity: "Legendary", img: "winter_2022_strawberry_shortcake_bat_dragon.png" },

            // НОВІ ПЕТИ З ДОВГИМИ НАЗВАМИ ЯК НА GITHUB
            { name: "Mechapup", rarity: "Legendary", img: "april_fools_2022_mechapup.png" },
            { name: "Hippogriff", rarity: "Legendary", img: "gifthat_november_2024_hippogriff.png" },
            { name: "Diamond Amazon", rarity: "Legendary", img: "rain_2023_diamond_amazon.png" },
            { name: "Nessie", rarity: "Legendary", img: "scottish_2023_nessie.png" },
            { name: "Capricorn", rarity: "Legendary", img: "space_house_2022_capricorn.png" },
            { name: "Balloon Unicorn", rarity: "Legendary", img: "summerfest_2024_balloon_unicorn.png" },
            { name: "Corn Doggo", rarity: "Legendary", img: "summerfest_2024_corn_doggo.png" },
            { name: "Gargoyle", rarity: "Legendary", img: "urban_2023_gargoyle.png" },
            
            // ПЕТИ, ЯКИХ ТИ ВЖЕ ЗАВАНТАЖИВ ПРАВИЛЬНО
            { name: "Axolotl", rarity: "Legendary", img: "axolotl.png" },
            { name: "Cerberus", rarity: "Legendary", img: "cerberus.png" },
            { name: "Cobra", rarity: "Legendary", img: "cobra.png" },
            { name: "Diamond Dragon", rarity: "Legendary", img: "diamond_dragon.png" },
            { name: "Diamond Griffin", rarity: "Legendary", img: "diamond_griffin.png" },
            { name: "Diamond Unicorn", rarity: "Legendary", img: "diamond_unicorn.png" },
            { name: "Golden Dragon", rarity: "Legendary", img: "golden_dragon.png" },
            { name: "Golden Griffin", rarity: "Legendary", img: "golden_griffin.png" },
            { name: "Golden Unicorn", rarity: "Legendary", img: "golden_unicorn.png" },
            { name: "Dodo", rarity: "Legendary", img: "dodo.png" },
            { name: "Octopus", rarity: "Legendary", img: "octopus.png" },
            { name: "Shark", rarity: "Legendary", img: "shark.png" },
            { name: "Phoenix", rarity: "Legendary", img: "phoenix.png" },
            { name: "Peacock", rarity: "Legendary", img: "peacock.png" },
            { name: "Queen Bee", rarity: "Legendary", img: "queen_bee.png" },
            { name: "T-Rex", rarity: "Legendary", img: "trex.png" }
        ];

        const container = document.getElementById('petContainer');
        const searchInput = document.getElementById('searchInput');

        function displayPets(rarityFilter = "", searchFilter = "") {
            container.innerHTML = "";
            let filtered = petData;
            if (rarityFilter) filtered = filtered.filter(p => p.rarity === rarityFilter);
            if (searchFilter) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchFilter.toLowerCase()));

            filtered.forEach(pet => {
                const card = document.createElement('div');
                card.className = 'pet-card';
                card.innerHTML = `
                    <div class="img-box">
                        <img src="${pet.img}" alt="${pet.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=Adopt+Me'">
                    </div>
                    <h3>${pet.name}</h3>
                    <p class="rarity">${pet.rarity}</p>
                    <button onclick="window.location.href='https://t.me/твій_нік'">ПРОДАТЬ</button>
                `;
                container.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => displayPets("", e.target.value));
        displayPets();
    </script>
</body>
</html>
