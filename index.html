<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Premium Adopt Me Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7d5fff; --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        body { 
            font-family: 'Montserrat', sans-serif; margin: 0; 
            background: var(--bg-gradient); background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: #fff; min-height: 100vh; 
        }

        header { 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); 
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .lang-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .lang-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(125,95,255,0.5); }

        .catalog { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; padding: 40px 5%; max-width: 1400px; margin: 0 auto;
        }

        .pet-card { 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 25px; 
            padding: 25px; border: 1px solid rgba(255,255,255,0.15); transition: 0.4s; text-align: center; cursor: pointer;
        }
        .pet-card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.2); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .pet-card img { width: 100%; height: 200px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); margin-bottom: 15px; }

        /* ВІКНО ОПИСУ */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
            display: none; justify-content: center; align-items: center; z-index: 2000; 
        }
        .modal { 
            background: #fff; color: #333; width: 90%; max-width: 550px; border-radius: 35px; 
            padding: 40px; position: relative; text-align: center; animation: modalAnim 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalAnim { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #ccc; border: none; background: none; transition: 0.3s; }
        .close-btn:hover { color: #333; transform: rotate(90deg); }

        .modal img { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; }
        .modal h2 { font-size: 32px; font-weight: 900; margin: 0 0 10px 0; }
        .modal-rarity { color: #ff4757; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        .modal-desc { font-size: 16px; line-height: 1.6; color: #666; margin-bottom: 30px; }

        .buy-btn { 
            background: var(--primary); color: #fff; text-decoration: none; padding: 18px; 
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            gap: 12px; font-weight: 800; font-size: 20px; transition: 0.3s;
        }
        .buy-btn:hover { background: #6745ff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(125,95,255,0.4); }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight:900; font-size:24px;">🐾 ELITESTORE</div>
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="changeLang('ua')">UA</button>
        <button class="lang-btn" onclick="changeLang('ru')">RU</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
    </div>
</header>

<div class="catalog" id="petContainer"></div>

<div class="modal-overlay" id="overlay" onclick="if(event.target==this) closePet()">
    <div class="modal">
        <button class="close-btn" onclick="closePet()">✕</button>
        <img id="m-img" src="" alt="">
        <h2 id="m-name"></h2>
        <span class="modal-rarity" id="m-rarity"></span>
        <p class="modal-desc" id="m-desc"></p>
        <a href="https://t.me/your_username" class="buy-btn">
            <i class="fa-solid fa-cart-shopping"></i> <span id="m-btn">КУПИТИ</span>
        </a>
    </div>
</div>

<script>
    const tr = {
        ua: { buy: "КУПИТИ", rarity: "Легендарний", info: "Найкращий вибір для вашої колекції!" },
        ru: { buy: "КУПИТЬ", rarity: "Легендарный", info: "Лучший выбор для вашей коллекции!" },
        en: { buy: "BUY NOW", rarity: "Legendary", info: "The best choice for your collection!" }
    };

    let curL = 'ua';

    // ВЕСЬ СПИСОК ПЕТІВ (31 шт)
    const pets = [
        { n: "Shadow Dragon", i: "shadow_dragon.png", d: { ua: "Король драконів.", ru: "Король драконов.", en: "The Shadow King." } },
        { n: "Frost Dragon", i: "frost_dragon.png" },
        { n: "Bat Dragon", i: "bat_dragon.png" },
        { n: "Giraffe", i: "giraffe.png" },
        { n: "Owl", i: "owl.png" },
        { n: "Parrot", i: "parrot.png" },
        { n: "Evil Unicorn", i: "evil_unicorn.png" },
        { n: "Crow", i: "crow.png" },
        { n: "Turtle", i: "turtle.png" },
        { n: "Kangaroo", i: "kangaroo.png" },
        { n: "Frost Fury", i: "frost_fury.png" },
        { n: "Arctic Reindeer", i: "arctic_reindeer.png" },
        { n: "Albino Monkey", i: "albino_monkey.png" },
        { n: "Monkey King", i: "monkey_king.png" },
        { n: "Diamond Butterfly", i: "sanctuary_2022_diamond_premium_butterfly.png" }, // Виправлено!
        { n: "SS Bat Dragon", i: "winter_2022_strawberry_shortcake_bat_dragon.png" },
        { n: "Mechapup", i: "mechapup.png" },
        { n: "Hippogriff", i: "urban_2023_gargoyle.png" },
        { n: "Diamond Amazon", i: "diamond_amazon.png" },
        { n: "Nessie", i: "nessie.png" },
        { n: "Capricorn", i: "capricorn.png" },
        { n: "Balloon Unicorn", i: "balloon_unicorn.png" },
        { n: "Corn Doggo", i: "corn_doggo.png" },
        { n: "Gargoyle", i: "urban_2023_gargoyle.png" },
        { n: "Axolotl", i: "axolotl.png" },
        { n: "Cerberus", i: "cerberus.png" },
        { n: "Cobra", i: "cobra.png" },
        { n: "Diamond Dragon", i: "diamond_dragon.png" },
        { n: "Diamond Griffin", i: "diamond_griffin.png" },
        { n: "Diamond Unicorn", i: "diamond_unicorn.png" },
        { n: "T-Rex", i: "trex.png" }
    ];

    function render() {
        const cont = document.getElementById('petContainer');
        cont.innerHTML = '';
        pets.forEach(p => {
            cont.innerHTML += `
                <div class="pet-card" onclick="showPet('${p.n}')">
                    <img src="${p.i}" alt="${p.n}" onerror="this.src='https://via.placeholder.com/200?text=Pet'">
                    <h3 style="margin:0; font-size:22px;">${p.n}</h3>
                    <p style="color:#ffeaa7; font-weight:700; margin-top:5px;">${tr[curL].rarity}</p>
                </div>`;
        });
    }

    function showPet(name) {
        const p = pets.find(x => x.n === name);
        document.getElementById('m-img').src = p.i;
        document.getElementById('m-name').innerText = p.n;
        document.getElementById('m-rarity').innerText = tr[curL].rarity;
        document.getElementById('m-desc').innerText = (p.d && p.d[curL]) ? p.d[curL] : tr[curL].info;
        document.getElementById('m-btn').innerText = tr[curL].buy;
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closePet() {
        document.getElementById('overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function changeLang(l) {
        curL = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
        render();
    }

    render();
</script>
</body>
</html>
