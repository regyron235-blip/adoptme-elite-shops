<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Ultra Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #7d5fff;
            --color2: #ff4dff;
            --color3: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* АНІМОВАНИЙ ГРАДІЄНТНИЙ ФОН */
        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000; overflow: hidden;
        }

        .blob {
            position: absolute; width: 800px; height: 800px;
            filter: blur(120px); border-radius: 50%; opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }
        .blob-1 { background: var(--color1); top: -10%; left: -10%; }
        .blob-2 { background: var(--color2); bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob-3 { background: var(--color3); top: 30%; left: 20%; animation-duration: 15s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20vw, 20vh) scale(1.2); }
        }

        /* ВЕРХНЯ ПАНЕЛЬ */
        .header {
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--color3);
            letter-spacing: 5px;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .support-trigger {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 900;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .support-trigger:hover { background: var(--color1); transform: scale(1.05); }

        /* СІТКА ТА КАРТКИ */
        .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--color2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card img {
            width: 140px; height: 140px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .pet-name {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #fff;
            text-transform: uppercase;
        }

        .tg-btn {
            display: block;
            padding: 15px;
            background: linear-gradient(90deg, #7d5fff, #ff4dff);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 11px;
            font-weight: 900;
            position: relative;
            z-index: 10; /* Кнопка завжди зверху */
        }

        /* МОДАЛЬНЕ ВІКНО ПІДТРИМКИ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #111;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
        }

        .close-modal {
            margin-top: 20px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="header">
        <h1>ELITE STORE</h1>
        <div class="subtitle">ULTRA PREMIUM INVENTORY</div>
        <div class="support-trigger" onclick="toggleSupport(true)">
            <i class="fa-solid fa-headset"></i> ПІДТРИМКА
        </div>
    </div>

    <div class="main">
        <div class="grid" id="catalog">
            </div>
    </div>

    <div class="modal-overlay" id="supportModal">
        <div class="modal-content">
            <h2 style="font-size: 30px; margin-bottom: 10px;">ELITE HELP</h2>
            <p style="color: #888; margin-bottom: 30px;">Маєте питання або хочете продати пета? Пишіть нам у Telegram!</p>
            <a href="https://t.me/your_tg" target="_blank" class="tg-btn" style="font-size: 14px;">ВІДКРИТИ TELEGRAM</a>
            <div class="close-modal" onclick="toggleSupport(false)">ЗАКРИТИ</div>
        </div>
    </div>

<script>
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    const catalog = document.getElementById('catalog');

    function render() {
        pets.forEach(pet => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="color:var(--color2); font-size:9px; font-weight:900; margin-bottom:15px; letter-spacing:2px;">LEGENDARY ITEM</div>
                <img src="${pet.img}" onerror="this.src='https://via.placeholder.com/140/111/fff?text=${pet.name}'">
                <div class="pet-name">${pet.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-btn">SEND OFFER</a>
            `;
            catalog.appendChild(card);
        });
    }

    function toggleSupport(show) {
        document.getElementById('supportModal').classList.toggle('active', show);
    }

    render();
</script>

</body>
</html>
