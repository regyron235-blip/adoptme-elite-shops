<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Elite Adopt Me Trading Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #7d5fff;
            --tg-color: #0088cc;
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: linear-gradient(-45deg, #0b0e14, #1a1a2e, #0f172a, #0b0e14);
            background-size: 400% 400%;
            animation: bgFlow 12s ease infinite;
            color: #fff; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 25px;
            display: flex; flex-direction: column; z-index: 100;
        }

        .logo {
            font-weight: 900; font-size: 28px;
            background: linear-gradient(45deg, #ff7675, #7d5fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 50px; text-align: center;
        }

        .nav-link {
            padding: 16px 20px; border-radius: 20px;
            background: var(--glass); color: #94a3b8;
            text-decoration: none; font-weight: 700; margin-bottom: 12px;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
            border: 1px solid transparent; cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent); color: #fff;
            transform: translateX(10px); box-shadow: 0 10px 20px rgba(125, 95, 255, 0.3);
        }

        .nav-link.support { margin-top: auto; border: 1px solid rgba(125, 95, 255, 0.3); color: #fff; }

        /* CATALOG */
        .main { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        /* LUXURY CARD */
        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 25px; text-align: center;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer;
        }
        .card:hover { transform: translateY(-15px); background: rgba(255, 255, 255, 0.08); border-color: var(--accent); }
        .card img { width: 100%; height: 160px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .sell-btn {
            background: var(--accent); color: #fff; border: none; padding: 15px;
            width: 100%; border-radius: 18px; margin-top: 15px; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }

        /* MODALS */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: #fff; color: #0f172a; width: 90%; max-width: 500px;
            border-radius: 45px; padding: 50px; position: relative; text-align: center;
            animation: modalIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes modalIn { from { transform: scale(0.8) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .tg-btn {
            background: var(--tg-color); color: white; text-decoration: none;
            padding: 20px 30px; border-radius: 25px; display: inline-flex;
            align-items: center; gap: 15px; font-weight: 900; font-size: 18px;
            margin-top: 25px; transition: 0.3s; box-shadow: 0 10px 25px rgba(0, 136, 204, 0.4);
        }
        .tg-btn:hover { transform: scale(1.05); box-shadow: 0 15px 35px rgba(0, 136, 204, 0.6); }

        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 32px; cursor: pointer; color: #cbd5e1; border: none; background: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE🐾STORE</div>
    <div class="nav-link active"><i class="fa-solid fa-ghost"></i> Усі пети</div>
    <div class="nav-link"><i class="fa-solid fa-fire"></i> Легендарні</div>
    
    <div class="nav-link support" onclick="openSupport()"><i class="fa-solid fa-headset"></i> Допомога та підтримка</div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
        <button onclick="setL('ua')" style="background:none; border:1px solid #444; color:white; cursor:pointer; padding:8px 12px; border-radius:12px;">UA</button>
        <button onclick="setL('ru')" style="background:none; border:1px solid #444; color:white; cursor:pointer; padding:8px 12px; border-radius:12px;">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target==this) closePet()">
    <div class="modal">
        <button class="close-btn" onclick="closePet()">✕</button>
        <img id="m-img" src="">
        <h2 id="m-name"></h2>
        <div style="color: #ff7675; font-weight: 900; letter-spacing: 1px; margin-top: 10px;">LEGENDARY RARITY</div>
        <p id="m-desc" style="color: #475569; line-height: 1.6; margin-top: 20px; text-align: left; background: #f8fafc; padding: 20px; border-radius: 20px;"></p>
        <button class="sell-btn" style="padding: 20px; font-size: 20px;">ПРОДАТИ ЗАРАЗ</button>
    </div>
</div>

<div class="overlay" id="supportModal" onclick="if(event.target==this) closeSupport()">
    <div class="modal">
        <button class="close-btn" onclick="closeSupport()">✕</button>
        <div style="font-size: 60px; margin-bottom: 20px;">💬</div>
        <h2 style="font-size: 32px;">Виникли питання?</h2>
        <p style="color: #64748b; font-size: 18px; margin-top: 15px;">Наша команда підтримки готова допомогти вам у будь-який час. Напишіть нам прямо у Telegram!</p>
        <a href="https://t.me/your_telegram_username" target="_blank" class="tg-btn">
            <i class="fa-brands fa-telegram" style="font-size: 30px;"></i> НАПИСАТИ В ТЕЛЕГРАМ
        </a>
    </div>
</div>

<script>
    let curL = 'ua';

    const pets = [
        { 
            name: "Shadow Dragon", img: "shadow_dragon.png", 
            ua: "Shadow Dragon — справжній символ багатства в Adopt Me. Випущений на Хелловін 2019, він має унікальний темний ефект та вважається найціннішим петом у грі.",
            ru: "Shadow Dragon — истинный символ богатства в Adopt Me. Выпущенный на Хэллоуин 2019, он имеет уникальный темный эффект и считается самым ценным петом."
        },
        { 
            name: "Frost Dragon", img: "frost_dragon.png", 
            ua: "Frost Dragon з'явився у зимовому оновленні 2019. Він дихає кригою та має неймовірне блакитне світіння в темряві.",
            ru: "Frost Dragon появился в зимнем обновлении 2019. Он дышит льдом и имеет невероятное голубое свечение в темноте."
        },
        { 
            name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png", 
            ua: "Diamond Butterfly — ексклюзивний діамантовий метелик. Один із найрідкісніших преміум-вихованців, якого важко знайти на ринку.",
            ru: "Diamond Butterfly — эксклюзивная бриллиантовая бабочка. Один из самых редких премиум-питомцев, которого сложно найти на рынке."
        }
        // ... додай тут інших петів за аналогією
    ];

    function render() {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        pets.forEach(p => {
            c.innerHTML += `
                <div class="card" onclick="openPet('${p.name}')">
                    <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200?text=Pet'">
                    <div style="color: #ff7675; font-size: 11px; font-weight: 900; margin-bottom: 10px;">LEGENDARY</div>
                    <h3>${p.name}</h3>
                    <button class="sell-btn">${curL === 'ua' ? 'ПРОДАТИ' : 'ПРОДАТЬ'}</button>
                </div>`;
        });
    }

    function openPet(name) {
        const p = pets.find(x => x.name === name);
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-desc').innerText = p[curL] || "Професійний опис для цього пета готується. Це рідкісний екземпляр!";
        document.getElementById('overlay').style.display = 'flex';
    }

    function closePet() { document.getElementById('overlay').style.display = 'none'; }
    
    function openSupport() { document.getElementById('supportModal').style.display = 'flex'; }
    function closeSupport() { document.getElementById('supportModal').style.display = 'none'; }

    function setL(l) { curL = l; render(); }

    render();
</script>
</body>
</html>
