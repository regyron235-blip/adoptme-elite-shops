<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Full Legendary Collection</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: #fff;
            display: flex; height: 100vh; overflow: hidden;
        }

        .menu-toggle {
            display: none;
            position: fixed; top: 15px; left: 15px; z-index: 1001;
            background: var(--accent); border: none; color: white;
            padding: 12px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 900; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }

        .sidebar {
            width: 300px; background: #0d1117; border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo { 
            font-weight: 900; font-size: 24px; text-align: center; margin-bottom: 40px; 
            background: linear-gradient(90deg, #a29bfe, #6c5ce7); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { 
            width: 100%; background: #05060a; border: 1px solid var(--glass-border); 
            padding: 14px 14px 14px 45px; border-radius: 12px; color: #fff; outline: none; 
        }
        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--accent-solid); }

        .nav-link { 
            padding: 15px 20px; border-radius: 12px; color: #8b949e; 
            text-decoration: none; font-weight: 700; margin-bottom: 10px; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link.active { background: var(--accent); color: #fff; }

        .lang-switcher { margin-top: auto; display: flex; gap: 10px; padding-top: 20px; }
        .l-btn { background: #161b22; border: 1px solid var(--glass-border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: 700; }
        .l-btn.active { background: var(--accent-solid); }

        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            border-radius: 30px; padding: 30px; text-align: center; 
            transition: 0.4s; cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: #6c5ce7; }
        .card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }
        .pet-name { font-size: 17px; font-weight: 900; margin-bottom: 15px; height: 40px; display: flex; align-items: center; justify-content: center; }

        .tg-btn { 
            background: #0088cc; color: #fff !important; text-decoration: none; 
            padding: 12px; width: 100%; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            font-weight: 800; font-size: 11px; text-transform: uppercase; 
        }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; 
            z-index: 2000; backdrop-filter: blur(8px); 
        }
        .modal { 
            background: #161b22; color: #fff; width: 90%; max-width: 450px; 
            border-radius: 35px; padding: 40px; position: relative; text-align: center; 
            border: 1px solid var(--glass-border); 
        }
        .info-tag { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; 
            margin: 15px 0; font-size: 14px; color: #a29bfe; font-weight: 700; 
        }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { padding: 80px 20px 20px 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .pet-name { font-size: 14px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i> <span id="menu-btn-txt">МЕНЮ</span>
</button>

<div class="sidebar" id="sidebar">
    <div class="logo">ELITE STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" onclick="toggleSidebar()"><span>Усі пети</span></div>
    <div class="nav-link" style="border: 1px solid #6c5ce7; color: #6c5ce7;" onclick="openSupport()"><span>Підтримка</span></div>
    
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="ua-btn" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="ru-btn" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="petOverlay" onclick="if(event.target==this) closePet()">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closePet()"></i>
        <img id="m-img" src="" style="width:160px;">
        <h2 id="m-name" style="margin-top:15px;"></h2>
        <div class="info-tag" id="m-info"></div>
        <p id="m-desc" style="color:#8b949e; margin-bottom:25px; font-size:14px;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn" id="m-btn"></a>
    </div>
</div>

        { name: "Giraffe", img: "pets.3/giraffe.png", year: "2019", event: "Safari Egg", ua: "Легендарний жираф.", ru: "Легендарный жираф." },

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function render(data = pets) {
        document.getElementById('searchInput').placeholder = lang[cur].search;
        document.getElementById('menu-btn-txt').innerText = lang[cur].menu;
        
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openPet(p.name);
            card.innerHTML = `
                <div style="color:#ff7675; font-size:10px; font-weight:900; margin-bottom:5px;">LEGENDARY</div>
                <div style="font-size:10px; color:#8b949e; margin-bottom:15px;">
                    ${lang[cur].year}: ${p.year} | ${lang[cur].event}: ${p.event}
                </div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140/161b22/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-btn" onclick="event.stopPropagation()">
                    <i class="fa-brands fa-telegram"></i> <span>${lang[cur].sell}</span>
                </a>
            `;
            c.appendChild(card);
        });
    }

    function openPet(name) {
        const p = pets.find(x => x.name === name);
        if(!p) return;
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-info').innerText = `${lang[cur].year}: ${p.year} | ${lang[cur].event}: ${p.event}`;
        document.getElementById('m-desc').innerText = cur === 'ua' ? p.ua : p.ru;
        document.getElementById('m-btn').innerHTML = `<i class="fa-brands fa-telegram"></i> ${lang[cur].sell}`;
        document.getElementById('petOverlay').style.display = 'flex';
    }

    function closePet() { document.getElementById('petOverlay').style.display = 'none'; }
    function openSupport() { alert("Напишіть нам в Telegram: @your_tg"); }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        cur = l;
        document.getElementById('ua-btn').classList.toggle('active', l === 'ua');
        document.getElementById('ru-btn').classList.toggle('active', l === 'ru');
        render();
    }

    render();
</script>
</body>
</html>
