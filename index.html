<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore Professional — Adopt Me Marketplace</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. CSS ЗМІННІ ТА БАЗОВІ СТИЛІ --- */
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --accent-light: #a29bfe;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --sidebar-bg: #0d1117;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #fff;
            --text-muted: #8b949e;
            --shadow-main: 0 10px 30px rgba(0,0,0,0.5);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.night-mode {
            --bg-dark: #020305;
            --card-bg: linear-gradient(180deg, #0a0e14 0%, #050709 100%);
            --sidebar-bg: #050709;
            --glass-border: rgba(255, 255, 255, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
            opacity: 0; animation: bodyFadeIn 1s forwards;
            transition: background 0.6s ease, color 0.6s ease;
        }

        @keyframes bodyFadeIn { to { opacity: 1; } }

        /* --- 2. БІЧНА ПАНЕЛЬ (SIDEBAR) --- */
        .sidebar {
            width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 1000;
            transition: var(--transition), background 0.5s ease;
            overflow-y: auto;
        }

        .logo { 
            font-weight: 900; font-size: 26px; text-align: center; margin-bottom: 40px; 
            background: var(--accent); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            cursor: pointer; transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { 
            width: 100%; background: #05060a; border: 1px solid var(--glass-border); 
            padding: 14px 14px 14px 45px; border-radius: 12px; color: var(--text-main); font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .search-box input:focus { border-color: var(--accent-solid); box-shadow: 0 0 10px rgba(108, 92, 231, 0.3); }
        .search-box i { position: absolute; left: 16px; top: 16px; color: var(--accent-solid); font-size: 16px; transition: 0.3s; }

        .nav-link { 
            padding: 16px 20px; border-radius: 12px; color: var(--text-muted); 
            text-decoration: none; font-weight: 700; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 14px; cursor: pointer;
            transition: var(--transition);
        }
        .nav-link:hover { background: rgba(255,255,255,0.04); color: var(--text-main); transform: translateX(8px); }
        .nav-link.active { background: var(--accent); color: var(--text-main); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3); }
        .nav-link i { font-size: 18px; width: 20px; text-align: center; }

        /* Красиве меню часових поясів */
        .timezone-selector { margin-bottom: 20px; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); }
        .timezone-selector label { font-size: 11px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 10px; text-transform: uppercase; }
        .tz-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .tz-btn { 
            padding: 10px 8px; border-radius: 10px; border: 1px solid var(--glass-border); 
            background: #05060a; color: var(--text-main); cursor: pointer; font-size: 11px; 
            font-weight: 700; transition: 0.3s; text-align: center;
        }
        .tz-btn:hover { border-color: var(--accent-solid); background: rgba(108, 92, 231, 0.1); }
        .tz-btn.active { background: var(--accent); border-color: var(--accent-solid); color: #fff; }

        /* --- 3. КАСТОМІЗАЦІЯ (КОЛІР САЙТУ) --- */
        .customizer-container { margin-top: 25px; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); }
        .custom-title { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        
        .theme-button { 
            width: 100%; padding: 12px; font-size: 11px; font-weight: 700; border-radius: 10px; 
            border: 1px solid var(--glass-border); background: rgba(108, 92, 231, 0.1); color: var(--accent-solid);
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-bottom: 10px;
        }
        .theme-button:hover { background: rgba(108, 92, 231, 0.2); border-color: var(--accent-solid); }

        /* Модалка вибору кольорів */
        .theme-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 2500; backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.4s ease;
        }
        .theme-overlay.open { opacity: 1; }

        .theme-modal {
            background: #161b22; color: var(--text-main); width: 90%; max-width: 500px;
            border-radius: 35px; padding: 40px; position: relative; text-align: center;
            border: 1px solid var(--glass-border); box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            transform: scale(0.8) translateY(20px); transition: var(--transition);
        }
        .theme-overlay.open .theme-modal { transform: scale(1) translateY(0); }

        .theme-title { font-size: 22px; font-weight: 900; margin-bottom: 25px; }

        .colors-palette {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px;
        }

        .color-item {
            position: relative; cursor: pointer; border-radius: 20px;
            border: 3px solid transparent; transition: var(--transition);
            aspect-ratio: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .color-item:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .color-item.active { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.5) !important; }

        .close-theme-btn {
            position: absolute; top: 20px; right: 20px; font-size: 26px; cursor: pointer;
            color: var(--text-muted); transition: 0.3s;
        }
        .close-theme-btn:hover { color: #fff; transform: rotate(90deg); }

        .reset-theme-btn {
            width: 100%; padding: 12px; font-size: 11px; font-weight: 700; border-radius: 10px;
            border: 1px solid var(--glass-border); background: transparent; color: var(--text-muted);
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .reset-theme-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

        /* --- 4. ПЕРЕМИКАЧ МОВ --- */
        .lang-switcher-sidebar { margin-top: auto; display: flex; gap: 10px; padding-top: 25px; border-top: 1px solid var(--glass-border); }
        .l-btn { 
            background: #161b22; border: 1px solid var(--glass-border); color: var(--text-muted); 
            padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: 700; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; 
        }
        .l-btn:hover { background: rgba(255,255,255,0.04); color: var(--text-main); }
        .l-btn.active-lang { background: var(--accent-solid); color: #fff; border-color: transparent; }

        /* --- 5. ГОЛОВНИЙ КОНТЕНТ --- */
        .main { flex: 1; overflow-y: auto; padding: 40px; position: relative; scroll-behavior: smooth; }
        
        .mobile-menu-toggle {
            display: none; position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: var(--accent); border: none; color: #fff; 
            padding: 15px; border-radius: 12px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); transition: 0.3s ease;
        }
        .mobile-menu-toggle:hover { transform: scale(1.05); }

        /* Вкладки контенту */
        .content-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--glass-border); }
        .tab-btn { 
            padding: 15px 25px; background: transparent; border: none; color: var(--text-muted); 
            cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.3s;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--accent-solid); border-bottom-color: var(--accent-solid); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Грід з картками */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; padding-bottom: 40px; }

        /* КАРТКА ПЕТА */
        .card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            border-radius: 35px; padding: 30px; text-align: center; 
            cursor: pointer; position: relative; overflow: hidden;
            opacity: 0; transform: translateY(30px);
            animation: cardFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transition: var(--transition), border-color 0.5s ease;
        }
        @keyframes cardFadeIn { to { opacity: 1; transform: translateY(0); } }

        .card:hover { transform: translateY(-12px); border-color: var(--accent-solid); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg); transition: 0.8s ease;
        }
        .card:hover::before { left: 100%; }

        .rarity-tag { font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #ff7675; margin-bottom: 8px; }

        .card img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); transition: transform 0.4s ease; }
        .card:hover img { transform: scale(1.05) rotate(2deg); }
        
        .pet-name { font-size: 17px; font-weight: 900; margin-bottom: 20px; color: var(--text-main); min-height: 40px; display: flex; align-items: center; justify-content: center; }

        .tg-btn { 
            background: #0088cc; color: #fff !important; text-decoration: none; 
            padding: 14px; width: 100%; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .tg-btn:hover { background: #00aaff; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4); transform: translateY(-2px); }

        /* НОВИНИ */
        .news-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 20px; cursor: pointer; transition: var(--transition); overflow: hidden;
        }
        .news-card:hover { transform: translateY(-5px); border-color: var(--accent-solid); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .news-title { font-size: 16px; font-weight: 900; color: var(--text-main); margin-bottom: 10px; line-height: 1.3; }
        .news-date { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; }
        .news-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .news-read-more { color: var(--accent-solid); font-weight: 700; font-size: 12px; cursor: pointer; }

        /* Пошук новин */
        .news-search { margin-bottom: 25px; position: relative; }
        .news-search input { 
            width: 100%; background: #05060a; border: 1px solid var(--glass-border); 
            padding: 14px 14px 14px 45px; border-radius: 12px; color: var(--text-main); font-size: 14px;
        }
        .news-search i { position: absolute; left: 16px; top: 16px; color: var(--accent-solid); }

        /* --- 6. МОДАЛЬНІ ВІКНА --- */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; 
            z-index: 2000; backdrop-filter: blur(10px); 
            opacity: 0; transition: opacity 0.4s ease;
        }
        .overlay.open { opacity: 1; }

        .modal { 
            background: #161b22; color: var(--text-main); width: 90%; max-width: 500px; 
            border-radius: 35px; padding: 45px; position: relative; text-align: center; 
            border: 1px solid var(--glass-border); box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            transform: scale(0.8) translateY(20px); transition: var(--transition);
            max-height: 80vh; overflow-y: auto;
        }
        .overlay.open .modal { transform: scale(1) translateY(0); }

        .close-btn { 
            position: absolute; top: 22px; right: 22px; font-size: 26px; cursor: pointer; 
            color: var(--text-muted); transition: 0.3s; padding: 5px; 
        }
        .close-btn:hover { color: #fff; transform: rotate(90deg); }

        .info-tag { 
            background: rgba(108, 92, 231, 0.1); padding: 12px 18px; border-radius: 12px; 
            margin: 20px 0; font-size: 14px; color: var(--accent-light); font-weight: 700; 
            border: 1px solid rgba(162, 155, 254, 0.2); 
        }

        /* --- 7. ПОВНОЕКРАННЕ МЕНЮ МОВ --- */
        .lang-modal-overlay {
            position: fixed; inset: 0; background: rgba(5, 6, 10, 0.98);
            z-index: 3000; display: none; flex-direction: column; padding: 60px 40px;
            overflow-y: auto; backdrop-filter: blur(15px);
            opacity: 0; transition: opacity 0.5s ease;
        }
        .lang-modal-overlay.open { opacity: 1; display: flex; }

        .lang-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; max-width: 1000px; width: 100%; margin-left: auto; margin-right: auto; }
        .lang-modal-title { font-size: 28px; font-weight: 900; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .lang-search { max-width: 400px; width: 100%; position: relative; }
        .lang-search input { width: 100%; background: #161b22; border: 1px solid var(--glass-border); padding: 14px 14px 14px 45px; border-radius: 12px; color: #fff; }
        .lang-search i { position: absolute; left: 16px; top: 16px; color: var(--accent-solid); }

        .lang-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; 
            max-width: 1000px; width: 100%; margin-left: auto; margin-right: auto;
            transform: translateY(30px); transition: transform 0.5s ease;
        }
        .lang-modal-overlay.open .lang-grid { transform: translateY(0); }

        .lang-item {
            background: #161b22; border: 1px solid var(--glass-border); padding: 18px; 
            border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            transition: var(--transition);
        }
        .lang-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.2); transform: translateY(-5px) scale(1.03); }
        .lang-item.active-choice { border-color: var(--accent-solid); background: rgba(108, 92, 231, 0.05); }
        .lang-flag { font-size: 24px; }
        .lang-name-container { display: flex; flex-direction: column; }
        .lang-main-name { font-weight: 700; font-size: 15px; color: #fff; }
        .lang-local-name { font-size: 12px; color: var(--text-muted); font-weight: 300; }

        /* --- 8. АДАПТИВАЦІЯ ДЛЯ МОБІЛОК --- */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; left: 0; top: 0; bottom: 0; 
                transform: translateX(-100%); width: 280px; box-shadow: 15px 0 40px rgba(0,0,0,0.7);
                border-right: none; z-index: 1001;
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-toggle { display: block; }
            .main { padding: 90px 15px 15px 15px; width: 100%; overflow-x: hidden; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 20px; }
            .card { padding: 18px; border-radius: 20px; }
            .news-container { grid-template-columns: 1fr; }
            .sidebar-overlay { 
                position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
                z-index: 999; display: none; opacity: 0; transition: 0.3s;
                backdrop-filter: blur(3px);
            }
            .sidebar-overlay.visible { display: block; opacity: 1; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<button class="mobile-menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i>
</button>

<div class="sidebar" id="sidebar">
    <div class="logo" onclick="location.reload()">ELITE STORE</div>
    
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>

    <div class="nav-link active" onclick="showTab('pets'); closeSidebar();">
        <i class="fa-solid fa-paw"></i> <span id="all-pets-text">Усі пети</span>
    </div>

    <div class="nav-link" onclick="showTab('news'); closeSidebar();">
        <i class="fa-solid fa-newspaper"></i> <span id="news-text">Новини</span>
    </div>
    
    <div class="nav-link" style="border: 1px solid var(--accent-solid); color: var(--accent-solid);" onclick="openSupport(); closeSidebar();">
        <i class="fa-solid fa-headset"></i> <span id="side-sup">Підтримка</span>
    </div>

    <div class="timezone-selector">
        <label id="tz-label">🌍 Часовий пояс</label>
        <div class="tz-grid" id="tzGrid"></div>
    </div>

    <div class="customizer-container">
        <span class="custom-title" id="color-title">КОЛІР САЙТУ</span>
        <button class="theme-button" onclick="openThemeSelector()">
            <i class="fa-solid fa-palette"></i> <span id="theme-btn-text">Вибрати колір</span>
        </button>
        <button class="reset-theme-btn" onclick="resetTheme()" id="reset-btn">ПОВЕРНУТИ</button>
    </div>
    
    <div class="lang-switcher-sidebar">
        <button onclick="setQuickLang('ua')" id="ua-btn" class="l-btn active-lang">
            <span>🇺🇦</span> UA
        </button>
        <button onclick="openAllLanguages()" id="eu-btn" class="l-btn">
            <span>🌐</span> ALL
        </button>
    </div>
</div>

<div class="main" id="mainContent">
    <!-- ПЕТИ -->
    <div class="tab-content active" id="pets-tab">
        <div class="grid" id="catalog"></div>
    </div>

    <!-- НОВИНИ -->
    <div class="tab-content" id="news-tab">
        <div class="news-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="newsSearchInput" oninput="filterNews()" placeholder="Пошук новин...">
        </div>
        <div class="news-container" id="newsContainer"></div>
    </div>
</div>

<!-- МОДАЛКА ВИБОРУ КОЛЬОРІВ -->
<div class="theme-overlay" id="themeOverlay" onclick="overlayClick(event, 'themeOverlay')">
    <div class="theme-modal">
        <i class="fa-solid fa-xmark close-theme-btn" onclick="closeThemeSelector()"></i>
        <h2 class="theme-title" id="theme-modal-title">Виберіть колір</h2>
        <div class="colors-palette" id="colorsPalette"></div>
    </div>
</div>

<div class="overlay" id="supportOverlay" onclick="overlayClick(event, 'supportOverlay')">
    <div class="modal">
         <i class="fa-solid fa-xmark close-btn" onclick="closeSupport()"></i>
         <div style="font-size: 55px; color: var(--accent-solid); margin-bottom: 25px;"><i class="fa-solid fa-comments"></i></div>
         <h2 id="sup-title" style="margin-bottom: 15px; font-weight: 900; font-size: 24px;"></h2>
         <p id="sup-desc" style="color: #fff; margin: 20px 0 30px; font-weight: 700; line-height: 1.6; font-size: 15px;"></p>
         <a href="https://t.me/your_tg" target="_blank" class="tg-btn" style="padding: 16px; font-size: 12px;">
             <i class="fa-brands fa-telegram"></i> <span>TELEGRAM SUPPORT</span>
         </a>
     </div>
</div>

<div class="overlay" id="petOverlay" onclick="overlayClick(event, 'petOverlay')">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closePet()"></i>
        <img id="m-img" src="" style="width:170px; margin-bottom: 15px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));">
        <h2 id="m-name" style="font-weight: 900; font-size: 22px;"></h2>
        <div class="info-tag" id="m-info"></div>
        <p id="m-desc" style="color:var(--text-muted); margin-bottom:30px; font-size:14px; line-height:1.6;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn">
            <i class="fa-brands fa-telegram"></i> <span id="m-sell-txt"></span>
        </a>
    </div>
</div>

<div class="overlay" id="newsDetailOverlay" onclick="overlayClick(event, 'newsDetailOverlay')">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closeNewsDetail()"></i>
        <h2 id="news-detail-title" style="font-weight: 900; font-size: 20px; margin-bottom: 15px;"></h2>
        <p id="news-detail-date" style="color: var(--text-muted); font-size: 12px; margin-bottom: 20px;"></p>
        <p id="news-detail-content" style="color:var(--text-muted); font-size:14px; line-height:1.8; text-align: left;"></p>
    </div>
</div>

<div class="lang-modal-overlay" id="langModalOverlay">
    <div class="lang-modal-header">
        <h1 class="lang-modal-title" id="lang-select-title"></h1>
        
        <div class="lang-search">
            <i class="fa-solid fa-magnifying-glass"></i>

                <div class="news-read-more" onclick="openNewsDetail('${title}', '${news.date}', '${desc}')">Детальніше →</div>

            container.appendChild(card);

    function filterNews() {
        const query = document.getElementById('newsSearchInput').value.toLowerCase();

            const title = (n['title_' + currentLang] || n.title_en).toLowerCase();
            const desc = (n['desc_' + currentLang] || n.desc_en).toLowerCase();
            return title.includes(query) || desc.includes(query);
        });
        renderNews(filtered);
    }

            colorItem.onclick = () => setTheme(theme.solid, theme.light, index);
            palette.appendChild(colorItem);
        });
        updateActiveColorButton();
    }

    function setTheme(c1, c2, themeIndex) {
        document.documentElement.style.setProperty('--accent', `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`);
        document.documentElement.style.setProperty('--accent-solid', c1);
        document.documentElement.style.setProperty('--accent-light', c2);
        localStorage.setItem('elite_theme', JSON.stringify({c1, c2, themeIndex}));
        updateActiveColorButton();
    }

    function resetTheme() { setTheme('#6c5ce7', '#a29bfe', 0); }

    function applyTheme() {
        const theme = JSON.parse(localStorage.getItem('elite_theme'));
        if(theme) {
            setTheme(theme.c1, theme.c2, theme.themeIndex);
        } else {
            resetTheme();
        }
    }

    function updateActiveColorButton() {
        const colors = document.querySelectorAll('.color-item');
        colors.forEach(c => c.classList.remove('active'));
        const theme = JSON.parse(localStorage.getItem('elite_theme'));
        if(theme && colors[theme.themeIndex]) {
            colors[theme.themeIndex].classList.add('active');
        }
    }

            btn.onclick = () => handleTimezoneChange(tz.code);
            grid.appendChild(btn);
        });

    function handleTimezoneChange(tz) {
        currentTimezone = tz;
        localStorage.setItem('elite_tz', tz);
        updateTimezoneTheme();
        generateTzGrid();
    }

    function updateTimezoneTheme() {
        try {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', { timeZone: currentTimezone, hour: '2-digit', hour12: false });
            const hour = parseInt(formatter.format(now));
            if (hour >= 18 || hour < 6) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }
        } catch (e) {
            document.body.classList.remove('night-mode');
        }
    }

        document.getElementById('news-text').innerText = langPack.newsText;
        document.getElementById('color-title').innerText = langPack.colorTitle;
        document.getElementById('theme-btn-text').innerText = langPack.themeBtnText;
        document.getElementById('reset-btn').innerText = langPack.resetBtn;
        document.getElementById('theme-modal-title').innerText = langPack.themeModalTitle;
        document.getElementById('tz-label').innerText = '🌍 ' + langPack.tzLabel;
        document.getElementById('lang-select-title').innerText = langPack.chooseLang;
        document.getElementById('langSearchInput').placeholder = langPack.search;
        document.getElementById('newsSearchInput').placeholder = langPack.search;
    }

    function filterLanguages() {
        const query = document.getElementById('langSearchInput').value.toLowerCase();
        const items = document.querySelectorAll('.lang-item');
        items.forEach(item => {
            const name = item.textContent.toLowerCase();
            item.style.display = name.includes(query) ? 'flex' : 'none';
        });
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.add('active');
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = pets.filter(p => 
            p.name.toLowerCase().includes(v) || 
            (p[currentLang] && p[currentLang].toLowerCase().includes(v))
        );
        render(filtered);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('visible');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('visible');
    }
</script>

</body>
</html>
