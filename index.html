<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Mobile Optimized</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: #fff;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Кнопка відкриття меню (тільки для мобілок) */
        .menu-toggle {
            display: none;
            position: fixed; top: 15px; left: 15px; z-index: 1001;
            background: var(--accent); border: none; color: white;
            padding: 10px 15px; border-radius: 10px; cursor: pointer;
            font-weight: 900; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px; background: #0d1117; border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo { font-weight: 900; font-size: 24px; text-align: center; margin-bottom: 40px; background: linear-gradient(90deg, #a29bfe, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { width: 100%; background: #05060a; border: 1px solid var(--glass-border); padding: 14px 14px 14px 45px; border-radius: 12px; color: #fff; outline: none; }
        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--accent-solid); }

        .nav-link { padding: 15px 20px; border-radius: 12px; color: #8b949e; text-decoration: none; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
        .nav-link.active { background: var(--accent); color: #fff; }
        .nav-link.support-link { margin-top: 20px; border: 1px solid var(--accent-solid); color: var(--accent-solid); }

        .lang-switcher { margin-top: auto; display: flex; gap: 10px; padding-top: 20px; }
        .l-btn { background: #161b22; border: 1px solid var(--glass-border); color: #fff; padding: 8px; border-radius: 8px; cursor: pointer; flex: 1; }
        .l-btn.active { background: var(--accent-solid); }

        /* MAIN CONTENT */
        .main { flex: 1; overflow-y: auto; padding: 40px; transition: 0.3s; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px; text-align: center; transition: 0.4s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: #6c5ce7; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }
        .pet-name { font-size: 19px; font-weight: 900; margin-bottom: 20px; }

        .tg-btn { background: #0088cc; color: #fff !important; text-decoration: none; padding: 14px; width: 100%; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; font-size: 10px; text-transform: uppercase; }

        /* АДАПТАЦІЯ ДЛЯ ТЕЛЕФОНІВ */
        @media (max-width: 768px) {
            .menu-toggle { display: block; } /* Показуємо кнопку */

            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%); /* Ховаємо меню за лівий край */
                box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            }

            /* Клас, який JS буде додавати для відкриття */
            .sidebar.open {
                transform: translateX(0);
            }

            .main { padding: 70px 20px 20px 20px; } /* Відступ зверху для кнопки */
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .card { padding: 20px; border-radius: 20px; }
            .card img { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i> <span id="menu-btn-txt">МЕНЮ</span>
</button>

<div class="sidebar" id="sidebar">
    <div class="logo">ELITE STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" onclick="toggleSidebar()"><span>Усі пети</span></div>
    <div class="nav-link support-link" onclick="openSupport(); toggleSidebar();"><span>Підтримка</span></div>
    
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="ua-btn" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="ru-btn" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<script>
    // Функція для приховування/показу меню
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('open');
    }

    // Решта логіки (мови, пошук, рендер) залишається як була
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png", year: "2019", event: "Halloween" },
        { name: "Frost Dragon", img: "frost_dragon.png", year: "2019", event: "Christmas" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png", year: "2022", event: "Leaf Event" },
        { name: "Albino Monkey", img: "albino_monkey.png", year: "2020", event: "Monkey Fair" }
        // Додай сюди інших 31 петів...
    ];

    let cur = 'ua';

    function render(data = pets) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="rarity" style="color:#ff7675; font-size:10px; font-weight:900; margin-bottom:5px;">LEGENDARY</div>
                <div style="font-size:11px; color:#8b949e; margin-bottom:15px;">${p.year} | ${p.event}</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140/161b22/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" class="tg-btn">Telegram</a>
            `;
            c.appendChild(card);
        });
    }

    function setL(l) {
        cur = l;
        document.getElementById('menu-btn-txt').innerText = l === 'ua' ? 'МЕНЮ' : 'МЕНЮ';
        document.getElementById('ua-btn').classList.toggle('active', l === 'ua');
        document.getElementById('ru-btn').classList.toggle('active', l === 'ru');
        render();
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    render();
</script>

</body>
</html>
