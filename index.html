<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Pure Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #7d5fff;
            --color2: #ff4dff;
            --color3: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* ТИЙ САМИЙ ВАЖКИЙ ФОН */
        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000; overflow: hidden;
        }

        .blob {
            position: absolute; width: 800px; height: 800px;
            filter: blur(120px); border-radius: 50%; opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }
        .blob-1 { background: var(--color1); top: -10%; left: -10%; }
        .blob-2 { background: var(--color2); bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob-3 { background: var(--color3); top: 30%; left: 20%; animation-duration: 15s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20vw, 20vh) scale(1.2); }
        }

        /* HEADER */
        .header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        h1 {
            font-size: clamp(50px, 10vw, 90px);
            background: linear-gradient(to bottom, #fff 40%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .support-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 35px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .support-btn:hover { background: var(--color1); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(125, 95, 255, 0.3); }

        /* СІТКА */
        .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 40px;
        }

        /* РОБОЧІ КАРТКИ */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--color1);
            background: rgba(255, 255, 255, 0.06);
        }

        .card img {
            width: 160px; height: 160px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
            transition: 0.4s;
        }

        .card:hover img { transform: scale(1.15); }

        .pet-name {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 25px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tg-link {
            display: block;
            padding: 18px;
            background: linear-gradient(90deg, var(--color1), var(--color2));
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .tg-link:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(125, 95, 255, 0.5);
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(30px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal.active { display: flex; }

        .modal-box {
            background: #0a0a0a;
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #222;
            max-width: 450px;
            width: 90%;
        }

        .close {
            margin-top: 25px;
            color: #444;
            cursor: pointer;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="header">
        <h1>ELITE STORE</h1>
        <button class="support-btn" onclick="toggleM(true)">Підтримка</button>
    </div>

    <div class="main">
        <div class="grid" id="catalog"></div>
    </div>

    <div class="modal" id="m">
        <div class="modal-box">
            <h2 style="font-size: 32px; margin-bottom: 15px;">SUPPORT</h2>
            <p style="color: #666; margin-bottom: 35px; line-height: 1.6;">Маєте питання або хочете зробити обмін? Зв'яжіться з нами в Telegram.</p>
            <a href="https://t.me/your_tg" target="_blank" class="tg-link">Написати менеджеру</a>
            <div class="close" onclick="toggleM(false)">[ ЗАКРИТИ ]</div>
        </div>
    </div>

<script>
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    const cat = document.getElementById('catalog');

    function render() {
        pets.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div style="color:var(--color2); font-size:10px; font-weight:900; margin-bottom:15px; letter-spacing:2px;">LEGENDARY</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/160/111/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-link">Send Offer</a>
            `;
            cat.appendChild(div);
        });
    }

    function toggleM(s) { document.getElementById('m').classList.toggle('active', s); }

    render();
</script>

</body>
</html>
