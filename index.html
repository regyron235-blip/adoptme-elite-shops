<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Магазин петів Adopt Me</title>
    
    <meta name="description" content="EliteStore — твій надійний магазин легендарних петів Adopt Me. Shadow Dragon, Bat Dragon, Frost Dragon та інші у наявності!">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #7d5fff;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --radius: 16px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* Шапка з мовами */
        header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 800; color: var(--primary); }

        .lang-switcher { display: flex; gap: 8px; }
        .lang-btn {
            background: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn.active { background: var(--primary); color: white; }

        /* Контейнер */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .pet-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.3s;
        }
        .pet-card:hover { transform: translateY(-5px); }

        .pet-card img { width: 100%; height: 160px; object-fit: contain; border-radius: 12px; background: #fafafa; }
        .pet-name { font-weight: bold; font-size: 18px; margin: 10px 0 5px; }
        .rarity { color: #ff4757; font-size: 11px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; }
        
        .buy-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            display: block;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🐾 ELITESTORE</div>
    <div class="lang-switcher">
        <button class="lang-btn active">UA</button>
        <button class="lang-btn">RU</button>
        <button class="lang-btn">EN</button>
    </div>
</header>

<div class="catalog" id="petContainer"></div>

<script>
    // ТУТ УСІ ТВОЇ ПЕТІ
    const petData = [
        { name: "Shadow Dragon", rarity: "Legendary", img: "shadow_dragon.png" },
        { name: "Bat Dragon", rarity: "Legendary", img: "bat_dragon.png" },
        { name: "Frost Dragon", rarity: "Legendary", img: "frost_dragon.png" },
        { name: "Giraffe", rarity: "Legendary", img: "giraffe.png" },
        { name: "Owl", rarity: "Legendary", img: "owl.png" },
        { name: "Parrot", rarity: "Legendary", img: "parrot.png" },
        { name: "Evil Unicorn", rarity: "Legendary", img: "evil_unicorn.png" },
        { name: "Crow", rarity: "Legendary", img: "crow.png" },
        { name: "Turtle", rarity: "Legendary", img: "turtle.png" },
        { name: "Kangaroo", rarity: "Legendary", img: "kangaroo.png" },
        { name: "Frost Fury", rarity: "Legendary", img: "frost_fury.png" },
        { name: "Arctic Reindeer", rarity: "Legendary", img: "arctic_reindeer.png" },
        { name: "Albino Monkey", rarity: "Legendary", img: "albino_monkey.png" },
        { name: "Monkey King", rarity: "Legendary", img: "monkey_king.png" },
        { name: "Diamond Butterfly", rarity: "Legendary", img: "diamond_butterfly.png" },
        { name: "Axolotl", rarity: "Legendary", img: "axolotl.png" },
        { name: "Cerberus", rarity: "Legendary", img: "cerberus.png" },
        { name: "Cobra", rarity: "Legendary", img: "cobra.png" },
        { name: "Diamond Dragon", rarity: "Legendary", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", rarity: "Legendary", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", rarity: "Legendary", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", rarity: "Legendary", img: "golden_dragon.png" },
        { name: "Golden Griffin", rarity: "Legendary", img: "golden_griffin.png" },
        { name: "Golden Unicorn", rarity: "Legendary", img: "golden_unicorn.png" },
        { name: "Dodo", rarity: "Legendary", img: "dodo.png" },
        { name: "Octopus", rarity: "Legendary", img: "octopus.png" },
        { name: "Shark", rarity: "Legendary", img: "shark.png" },
        { name: "Phoenix", rarity: "Legendary", img: "phoenix.png" },
        { name: "Peacock", rarity: "Legendary", img: "peacock.png" },
        { name: "Queen Bee", rarity: "Legendary", img: "queen_bee.png" },
        { name: "T-Rex", rarity: "Legendary", img: "trex.png" }
    ];

    const container = document.getElementById('petContainer');

    petData.forEach(pet => {
        const card = `
            <div class="pet-card">
                <img src="${pet.img}" alt="${pet.name}">
                <div class="pet-name">${pet.name}</div>
                <span class="rarity">${pet.rarity}</span>
                <a href="https://t.me/твій_нік" class="buy-btn">КУПИТИ</a>
            </div>
        `;
        container.innerHTML += card;
    });
</script>

</body>
</html>
