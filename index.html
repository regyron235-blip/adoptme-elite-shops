<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Final Version</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #7d5fff;
            --color2: #ff4dff;
            --bg: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* ФОНОВИЙ ГРАДІЄНТ (ВАЖКИЙ) */
        .bg-wrapper {
            position: fixed; inset: 0; z-index: -1; background: #000; overflow: hidden;
        }
        .blob {
            position: absolute; width: 700px; height: 700px; filter: blur(120px);
            border-radius: 50%; opacity: 0.35; animation: move 18s infinite alternate ease-in-out;
        }
        .blob-1 { background: var(--color1); top: -15%; left: -10%; }
        .blob-2 { background: var(--color2); bottom: -15%; right: -10%; animation-delay: -4s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.1); }
        }

        /* HEADER */
        .header { padding: 50px 20px; text-align: center; }
        h1 {
            font-size: clamp(45px, 9vw, 80px); margin-bottom: 25px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .controls {
            max-width: 550px; margin: 0 auto 45px; display: flex; flex-direction: column; gap: 18px;
        }

        .search-box { position: relative; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 16px 16px 50px; border-radius: 15px; color: #fff; outline: none; font-weight: 600;
            transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--color1); background: rgba(255,255,255,0.1); }
        .search-box i { position: absolute; left: 18px; top: 18px; color: #7d5fff; }

        .btn-row { display: flex; justify-content: center; gap: 12px; }
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px 25px; border-radius: 12px; cursor: pointer;
            font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.3s;
        }
        .btn:hover, .btn.active { background: var(--color1); border-color: var(--color1); transform: translateY(-2px); }

        /* КАРТКИ */
        .main { padding: 0 20px 80px; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }

        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 35px;
            padding: 35px 25px; text-align: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--color2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card img {
            width: 150px; height: 150px; object-fit: contain;
            margin-bottom: 18px; filter: drop-shadow(0 12px 20px rgba(0,0,0,0.6));
            transition: 0.4s;
        }
        .card:hover img { transform: scale(1.1) rotate(3deg); }

        .rarity {
            color: var(--color2); font-size: 9px; font-weight: 900;
            margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase;
        }

        .pet-name {
            font-size: 17px; font-weight: 900; margin-bottom: 25px;
            color: #fff; text-transform: uppercase; letter-spacing: 1px;
        }

        /* КНОПКА З ПЕРЕКЛАДОМ */
        .offer-btn {
            display: block; width: 100%; padding: 16px;
            background: linear-gradient(135deg, #7d5fff, #ff4dff);
            border-radius: 18px; color: white; text-decoration: none;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(125, 95, 255, 0.2);
        }
        .offer-btn:hover { transform: scale(1.03); box-shadow: 0 10px 25px rgba(125, 95, 255, 0.4); }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(25px);
        }
        .modal.active { display: flex; }
        .modal-box { 
            background: #0a0a0a; padding: 50px; border-radius: 40px; 
            text-align: center; border: 1px solid #222; width: 90%; max-width: 420px; 
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="header">
        <h1>ELITE STORE</h1>
        <div class="controls">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
            </div>
            <div class="btn-row">
                <button class="btn" onclick="toggleM(true)" id="supBtn">Підтримка</button>
                <button class="btn active" onclick="setL('ua')" id="uaBtn">UA</button>
                <button class="btn" onclick="setL('ru')" id="ruBtn">RU</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="grid" id="catalog"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 id="mTitle" style="font-size: 30px; margin-bottom: 15px;">SUPPORT</h2>
            <p id="mText" style="color: #777; margin-bottom: 30px; line-height: 1.5;">Маєте питання або хочете зробити обмін?</p>
            <a href="https://t.me/your_tg" target="_blank" class="offer-btn" id="mBtn">Написати в TG</a>
            <div onclick="toggleM(false)" style="margin-top: 25px; cursor: pointer; color: #444; font-size: 11px; font-weight: 800;">[ ЗАКРИТИ ]</div>
        </div>
    </div>

<script>
    const lang = {
        ua: { search: "Пошук...", support: "Підтримка", buy: "написати в tg", mTitle: "ПІДТРИМКА", mText: "Маєте питання або хочете продати пета? Пишіть нам!" },
        ru: { search: "Поиск...", support: "Поддержка", buy: "написать в tg", mTitle: "ПОДДЕРЖКА", mText: "Есть вопросы или хотите продать пета? Пишите нам!" }
    };
    let curL = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        const cat = document.getElementById('catalog');
        cat.innerHTML = '';
        data.forEach(p => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
                <div class="rarity">LEGENDARY ITEM</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150/111/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="offer-btn">${lang[curL].buy}</a>
            `;
            cat.appendChild(d);
        });
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        curL = l;
        document.getElementById('uaBtn').classList.toggle('active', l === 'ua');
        document.getElementById('ruBtn').classList.toggle('active', l === 'ru');
        document.getElementById('searchInput').placeholder = lang[l].search;
        document.getElementById('supBtn').innerText = lang[l].support;
        document.getElementById('mTitle').innerText = lang[l].mTitle;
        document.getElementById('mText').innerText = lang[l].mText;
        document.getElementById('mBtn').innerText = lang[l].buy;
        render();
    }

    function toggleM(s) { document.getElementById('modal').classList.toggle('active', s); }

    render();
</script>
</body>
</html>
