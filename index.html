<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EliteStore — Stable</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #7d5fff;
            --bg-dark: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: var(--bg-dark); color: #fff; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px; background: #000;
            border-right: 1px solid var(--border);
            padding: 25px; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; display: block; }
            .sidebar { width: 100%; height: auto; position: sticky; top: 0; padding: 10px; border-bottom: 1px solid var(--border); }
            .logo { font-size: 18px !important; margin-bottom: 10px !important; }
            .main { padding: 15px !important; }
            .grid { 
                display: grid !important; 
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; 
                gap: 10px !important; 
            }
            .card { padding: 15px 10px !important; }
            .card img { width: 90px !important; height: 90px !important; }
            .pet-name { font-size: 13px !important; }
        }

        .logo { font-weight: 900; font-size: 22px; text-align: center; margin-bottom: 25px; color: #7d5fff; }

        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input {
            width: 100%; background: #1a1d23; border: 1px solid var(--border);
            padding: 10px 10px 10px 35px; border-radius: 10px; color: #fff; outline: none;
        }
        .search-box i { position: absolute; left: 12px; top: 12px; color: var(--accent); }

        .nav-link {
            padding: 12px; border-radius: 10px; color: #888;
            text-decoration: none; font-weight: 700; margin-bottom: 5px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .nav-link.active { background: var(--accent); color: #fff; }

        .main { flex: 1; overflow-y: auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

        /* КАРТКА */
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; text-align: center;
            transition: 0.2s; position: relative;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .pet-name { font-size: 16px; font-weight: 800; margin-bottom: 15px; }

        /* КНОПКА - ТЕПЕР ПРЯМЕ ПОСИЛАННЯ */
        .tg-btn {
            background: #0088cc; color: #fff !important; text-decoration: none !important;
            padding: 12px; width: 100%; border-radius: 10px;
            display: block; font-weight: 800; font-size: 9px; 
            text-transform: uppercase; transition: 0.2s;
        }
        .tg-btn:active { transform: scale(0.95); }

        /* МОДАЛКА */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .support-modal { background: #111; padding: 30px; border-radius: 20px; text-align: center; position: relative; width: 90%; max-width: 350px; border: 1px solid #333; }
        .close-x { position: absolute; top: 10px; right: 15px; font-size: 20px; color: #555; cursor: pointer; }

        .lang-switcher { margin-top: auto; display: flex; gap: 5px; justify-content: center; padding: 10px 0; }
        .l-btn { background: none; border: 1px solid #333; color: #555; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; }
        .l-btn.active { border-color: var(--accent); color: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE STORE</div>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>
    <div class="nav-link active" id="nav-all" onclick="clearSearch()"><i class="fa-solid fa-paw"></i> <span>Усі пети</span></div>
    <div class="nav-link" id="nav-sup" onclick="toggleSupport(true)"><i class="fa-solid fa-headset"></i> <span>Підтримка</span></div>

    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main"><div class="grid" id="catalog"></div></div>

<div class="modal-overlay" id="modalSupport">
    <div class="support-modal">
        <div class="close-x" onclick="toggleSupport(false)">✕</div>
        <h2 id="sup-title">ПІДТРИМКА</h2>
        <p id="sup-text" style="color:#aaa; font-size:13px; margin-bottom:20px;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn">НАПИСАТИ В TELEGRAM</a>
    </div>
</div>

<script>
    const lang = {
        ua: { all: "Усі пети", sup: "Підтримка", buy: "написать по поводу продажи в tg", search: "Пошук...", supTitle: "ПІДТРИМКА", supText: "Є питання? Пишіть нам!" },
        ru: { all: "Все петы", sup: "Поддержка", buy: "написать по поводу продажи в tg", search: "Поиск...", supTitle: "ПОДДЕРЖКА", supText: "Есть вопросы? Пишите нам!" }
    };
    let cur = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            c.innerHTML += `
                <div class="card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/120'">
                    <div class="pet-name">${p.name}</div>
                    <a href="https://t.me/your_tg" target="_blank" class="tg-btn">
                        ${lang[cur].buy}
                    </a>
                </div>`;
        });
        document.querySelector('#nav-all span').innerText = lang[cur].all;
        document.querySelector('#nav-sup span').innerText = lang[cur].sup;
        document.getElementById('searchInput').placeholder = lang[cur].search;
        document.getElementById('sup-title').innerText = lang[cur].supTitle;
        document.getElementById('sup-text').innerText = lang[cur].supText;
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(val)));
    }

    function clearSearch() { document.getElementById('searchInput').value = ''; render(); }
    function toggleSupport(s) { document.getElementById('modalSupport').classList.toggle('active', s); }
    function setL(l) { 
        cur = l; 
        document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l)); 
        render(); 
    }

    render();
</script>
</body>
</html>
