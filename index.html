<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Premium Adopt Me Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #7d5fff;
            --tg-color: #0088cc;
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: #0b0e14; color: #fff; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(40px); border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 100;
        }

        .logo {
            font-weight: 900; font-size: 26px; color: #ff75c3;
            margin-bottom: 50px; text-align: center; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .nav-link {
            padding: 16px 20px; border-radius: 15px; color: #fff;
            text-decoration: none; font-weight: 600; margin-bottom: 10px;
            transition: 0.3s; display: flex; align-items: center; gap: 15px;
            cursor: pointer; background: transparent;
        }

        .nav-link.active { background: var(--accent); }
        .nav-link:hover:not(.active) { background: var(--glass); }

        .nav-link.support { margin-top: auto; background: var(--glass); border: 1px solid var(--glass-border); }

        /* MAIN CONTENT */
        .main { flex: 1; overflow-y: auto; padding: 40px; background: #0b0e14; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* КАРТКА ПЕТА */
        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 30px; text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: scale(1.05); border-color: var(--accent); background: rgba(125, 95, 255, 0.05); }
        .card img { width: 160px; height: 160px; object-fit: contain; margin-bottom: 15px; }
        
        .rarity { color: #ff7675; font-size: 10px; font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; }
        .pet-name { font-size: 20px; font-weight: 800; margin: 10px 0; }

        .sell-btn {
            background: var(--accent); color: #fff; border: none; padding: 14px;
            width: 100%; border-radius: 15px; font-weight: 800;
            cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        .sell-btn:hover { filter: brightness(1.2); box-shadow: 0 5px 15px rgba(125, 95, 255, 0.4); }

        /* MODALS */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: #161b22; color: #fff; width: 90%; max-width: 500px;
            border-radius: 35px; padding: 40px; position: relative; text-align: center;
            border: 1px solid var(--glass-border);
        }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #444; border: none; background: none; }

        .lang-switcher { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .l-btn { background: var(--glass); border: 1px solid var(--glass-border); color: #888; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .l-btn.active { border-color: var(--accent); color: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE <i class="fa-solid fa-cloud"></i> STORE</div>
    <div class="nav-link active" id="menu-all"><i class="fa-solid fa-ghost"></i> Усі пети</div>
    <div class="nav-link" id="menu-leg"><i class="fa-solid fa-fire"></i> Легендарні</div>
    
    <div class="nav-link support" onclick="openSupport()" id="menu-sup"><i class="fa-solid fa-headset"></i> Допомога та підтримка</div>
    
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="btn-ua" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="btn-ru" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="supportModal" onclick="if(event.target==this) closeSupport()">
    <div class="modal">
        <button class="close-btn" onclick="closeSupport()">✕</button>
        <h2 id="sup-title" style="font-size: 28px;"></h2>
        <p id="sup-text" style="color: #8b949e; line-height: 1.6; font-size: 16px; margin: 20px 0;"></p>
        <a href="https://t.me/your_tg" target="_blank" style="background:#0088cc; color:#fff; text-decoration:none; padding:15px 30px; border-radius:15px; display:inline-block; font-weight:800;">
            <i class="fa-brands fa-telegram"></i> TELEGRAM
        </a>
    </div>
</div>

<script>
    const lang = {
        ua: {
            all: "Усі пети", leg: "Легендарні", sup: "Допомога та підтримка",
            sell: "ПРОДАТЬ", supTitle: "Маєте питання?", 
            supText: "Напишіть нам у Telegram, і ми допоможемо вам з трейдом або покупкою!"
        },
        ru: {
            all: "Все петы", leg: "Легендарные", sup: "Помощь и поддержка",
            sell: "ПРОДАТЬ", supTitle: "Есть вопросы?", 
            supText: "Напишите нам в Telegram, и мы поможем вам с трейдом или покупкой!"
        }
    };

    let cur = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render() {
        // Оновлення тексту меню
        document.getElementById('menu-all').innerHTML = `<i class="fa-solid fa-ghost"></i> ${lang[cur].all}`;
        document.getElementById('menu-sup').innerHTML = `<i class="fa-solid fa-headset"></i> ${lang[cur].sup}`;

        const c = document.getElementById('catalog');
        c.innerHTML = '';
        pets.forEach(p => {
            c.innerHTML += `
                <div class="card">
                    <div class="rarity">LEGENDARY</div>
                    <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/160?text=Pet'">
                    <div class="pet-name">${p.name}</div>
                    <button class="sell-btn">${lang[cur].sell}</button>
                </div>`;
        });
    }

    function openSupport() {
        document.getElementById('sup-title').innerText = lang[cur].supTitle;
        document.getElementById('sup-text').innerText = lang[cur].supText;
        document.getElementById('supportModal').style.display = 'flex';
    }

    function closeSupport() { document.getElementById('supportModal').style.display = 'none'; }

    function setL(l) { 
        cur = l; 
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        render(); 
    }

    render();
</script>
</body>
</html>
