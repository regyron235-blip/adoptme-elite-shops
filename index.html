<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore v3.0 | Professional Asset Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;500;700;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- SECTION 1: GLOBAL CSS RESET & NORMALIZE --- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #020408;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input {
            font-family: inherit;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* --- SECTION 2: DESIGN SYSTEM VARIABLES --- */
        :root {
            /* Colors */
            --p-accent: #7b61ff;
            --p-accent-rgb: 123, 97, 255;
            --p-accent-glow: rgba(var(--p-accent-rgb), 0.4);
            --p-accent-soft: rgba(var(--p-accent-rgb), 0.1);
            
            --bg-ultra: #020408;
            --bg-deep: #0a0c12;
            --bg-panel: #0f121a;
            --bg-card: #161a24;
            --bg-glass: rgba(22, 26, 36, 0.7);
            
            --text-main: #f5f6f7;
            --text-dim: #949ba4;
            --text-muted: #4e5058;
            
            /* Gradients */
            --grad-leg: linear-gradient(135deg, #ff8a00 0%, #da1b1b 100%);
            --grad-ultra: linear-gradient(135deg, #7b61ff 0%, #00d1ff 100%);
            --grad-rare: linear-gradient(135deg, #007aff 0%, #00c6ff 100%);
            --grad-btn: linear-gradient(90deg, #0088cc 0%, #00aaff 100%);
            --grad-surface: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            
            /* Borders & Shadows */
            --border-light: 1px solid rgba(255, 255, 255, 0.08);
            --border-accent: 1px solid var(--p-accent);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-md: 0 12px 24px rgba(0,0,0,0.6);
            --shadow-lg: 0 24px 48px rgba(0,0,0,0.8);
            
            /* Typography Scale */
            --fs-xs: 0.75rem;
            --fs-sm: 0.875rem;
            --fs-base: 1rem;
            --fs-lg: 1.125rem;
            --fs-xl: 1.25rem;
            --fs-2xl: 1.5rem;
            --fs-3xl: 2rem;
            
            /* Timings */
            --t-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --t-normal: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --t-slow: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* --- SECTION 3: ADVANCED KEYFRAME ENGINE --- */
        @keyframes ultraSlideIn {
            0% { transform: translateX(-100px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes ultraFadeUp {
            0% { transform: translateY(40px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 10px var(--p-accent-glow); }
            50% { box-shadow: 0 0 30px var(--p-accent-glow), 0 0 10px var(--p-accent); }
            100% { box-shadow: 0 0 10px var(--p-accent-glow); }
        }

        @keyframes rotate3D {
            0% { transform: perspective(1000px) rotateY(0deg); }
            50% { transform: perspective(1000px) rotateY(10deg); }
            100% { transform: perspective(1000px) rotateY(0deg); }
        }

        @keyframes floatingPet {
            0% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(2deg); }
            66% { transform: translateY(-5px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes shimmerEffect {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(150%); }
        }

        @keyframes modalEnter {
            0% { opacity: 0; backdrop-filter: blur(0px); }
            100% { opacity: 1; backdrop-filter: blur(12px); }
        }

        @keyframes contentEnter {
            0% { opacity: 0; transform: scale(0.8) translateY(100px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes headerGlow {
            from { text-shadow: 0 0 5px #fff; }
            to { text-shadow: 0 0 20px var(--p-accent), 0 0 30px var(--p-accent); }
        }

        /* --- SECTION 4: SCROLLBAR CUSTOMIZATION --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-ultra);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 100px;
            border: 2px solid var(--bg-ultra);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--p-accent);
        }

        /* --- SECTION 5: SIDEBAR ARCHITECTURE --- */
        .sidebar {
            width: 320px;
            height: 100vh;
            background-color: var(--bg-panel);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            border-right: var(--border-light);
            z-index: 1000;
            animation: ultraSlideIn 0.8s var(--t-slow);
        }

        /* Brand Identity */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 60px;
            padding-left: 8px;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            background: var(--grad-ultra);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 10px 25px var(--p-accent-glow);
            animation: neonPulse 3s infinite;
        }

        .brand-name {
            font-family: var(--font-header);
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--p-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Navigation Menu System */
        .nav-label {
            font-size: 11px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 24px;
            padding-left: 12px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 40px;
        }

        .nav-item {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 15px;
            transition: var(--t-normal);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .nav-item i {
            font-size: 18px;
            width: 24px;
            text-align: center;
            transition: var(--t-fast);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            transform: translateX(8px);
        }

        .nav-item:hover i {
            color: var(--p-accent);
            transform: scale(1.2);
        }

        .nav-item.active {
            background: var(--p-accent);
            color: #fff;
            box-shadow: 0 12px 24px var(--p-accent-glow);
        }

        .nav-item.active i {
            color: #fff;
        }

        /* Configuration Panel */
        .sidebar-footer {
            margin-top: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 24px;
            border: var(--border-light);
        }

        .config-title {
            font-size: 10px;
            font-weight: 900;
            color: var(--text-muted);
            margin-bottom: 18px;
            text-align: center;
            display: block;
            letter-spacing: 2px;
        }

        .theme-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--t-fast);
            position: relative;
        }

        .color-dot:hover {
            transform: scale(1.25);
        }

        .color-dot.active::after {
            content: '✓';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            font-weight: 900;
        }

        .lang-switcher {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-ultra);
            padding: 6px;
            border-radius: 14px;
            gap: 6px;
        }

        .lang-btn {
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            transition: var(--t-fast);
        }

        .lang-btn.active {
            background: var(--bg-card);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        /* --- SECTION 6: MAIN CONTENT STAGE --- */
        .main-stage {
            margin-left: 320px;
            width: calc(100% - 320px);
            padding: 60px 80px;
            position: relative;
            min-height: 100vh;
        }

        /* Header Engine */
        .top-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            animation: ultraFadeUp 0.8s var(--t-slow);
        }

        .search-engine {
            position: relative;
            width: 500px;
        }

        .search-engine i {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
            transition: var(--t-fast);
        }

        .search-bar {
            width: 100%;
            background-color: var(--bg-panel);
            border: var(--border-light);
            padding: 22px 22px 22px 68px;
            border-radius: 24px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            transition: var(--t-normal);
        }

        .search-bar:focus {
            background-color: var(--bg-card);
            border-color: var(--p-accent);
            box-shadow: 0 0 40px var(--p-accent-soft);
        }

        .search-bar:focus + i {
            color: var(--p-accent);
        }

        /* --- SECTION 7: PET CARD COMPONENT --- */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
        }

        .pet-card {
            background: var(--bg-card);
            border-radius: 48px;
            padding: 48px;
            position: relative;
            border: var(--border-light);
            transition: var(--t-slow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: ultraFadeUp 0.8s backwards;
            cursor: default;
        }

        .pet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .pet-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--p-accent);
            box-shadow: var(--shadow-lg);
        }

        .pet-card:hover::before {
            left: 100%;
            transition: 0.8s;
        }

        /* Card Content Hierarchy */
        .rarity-badge {
            align-self: flex-start;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
        }

        .rarity-leg { background: var(--grad-leg); }
        .rarity-ultra { background: var(--grad-ultra); }
        .rarity-rare { background: var(--grad-rare); }

        .pet-year-info {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pet-year-info i { font-size: 10px; color: var(--p-accent); }

        .pet-display {
            width: 100%;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 36px;
            position: relative;
        }

        .pet-display img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
            transition: var(--t-normal);
            animation: floatingPet 4s ease-in-out infinite;
        }

        .pet-card:hover .pet-display img {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 30px 60px rgba(var(--p-accent-rgb), 0.4));
        }

        .pet-name-h3 {
            font-family: var(--font-header);
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            margin-bottom: 40px;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .btn-action-primary {
            width: 100%;
            padding: 22px;
            border-radius: 24px;
            background: var(--grad-btn);
            color: #fff;
            font-weight: 900;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
            transition: var(--t-normal);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action-primary:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 15px 30px rgba(0, 136, 204, 0.5);
        }

        .btn-action-primary i {
            font-size: 20px;
            transition: var(--t-fast);
        }

        .btn-action-primary:hover i {
            transform: rotate(-15deg) translateX(5px);
        }

        /* --- SECTION 8: ULTRA MODAL ENGINE --- */
        .modal-root {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: modalEnter 0.4s forwards;
        }

        .modal-root.active {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
        }

        .modal-container {
            width: 100%;
            max-width: 580px;
            background: var(--bg-panel);
            border: var(--border-accent);
            border-radius: 40px;
            padding: 64px;
            position: relative;
            z-index: 10;
            text-align: center;
            box-shadow: 0 0 100px rgba(var(--p-accent-rgb), 0.2);
            animation: contentEnter 0.5s var(--t-slow) forwards;
        }

        .modal-close-trigger {
            position: absolute;
            top: 32px;
            right: 32px;
            font-size: 30px;
            color: var(--text-muted);
            transition: var(--t-fast);
        }

        .modal-close-trigger:hover {
            color: #fff;
            transform: rotate(90deg) scale(1.2);
        }

        .support-graphic {
            width: 110px;
            height: 110px;
            background: var(--p-accent-soft);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: var(--p-accent);
            margin: 0 auto 36px;
            border: 1px solid var(--p-accent-glow);
        }

        .modal-headline {
            font-family: var(--font-header);
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-subtext {
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 48px;
        }

        .telegram-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 26px;
            background: #24A1DE;
            border-radius: 24px;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            transition: var(--t-normal);
            box-shadow: 0 10px 25px rgba(36, 161, 222, 0.4);
        }

        .telegram-cta:hover {
            transform: scale(1.05) translateY(-5px);
            filter: brightness(1.1);
            box-shadow: 0 20px 40px rgba(36, 161, 222, 0.6);
        }

        /* --- SECTION 9: UTILITY SYSTEM --- */
        .hidden { display: none !important; }
        .text-accent { color: var(--p-accent); }
        .mt-20 { margin-top: 20px; }
        .glass-effect { backdrop-filter: var(--glass-blur); background: var(--bg-glass); }

        /* --- SECTION 10: RESPONSIVE ADAPTIVITY --- */
        @media (max-width: 1400px) {
            .sidebar { width: 100px; padding: 40px 15px; }
            .brand-name, .nav-label, .nav-item span, .sidebar-footer { display: none; }
            .nav-item { justify-content: center; padding: 18px; }
            .nav-item i { font-size: 22px; }
            .main-stage { margin-left: 100px; width: calc(100% - 100px); padding: 40px; }
            .search-engine { width: 100%; }
        }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 20px;
                border-right: none;
                border-bottom: var(--border-light);
            }
            .brand-container { margin-bottom: 0; }
            .nav-section { display: none; }
            .main-stage { margin-left: 0; width: 100%; padding: 24px; }
            .top-navigation { margin-bottom: 32px; }
            .pet-card { padding: 32px; border-radius: 32px; }
            .pet-name-h3 { font-size: 20px; margin-bottom: 24px; }
        }

        @media (max-width: 500px) {
            .modal-container { padding: 40px 24px; border-radius: 30px; }
            .modal-headline { font-size: 24px; }
            .asset-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        /**
         * UI INITIALIZATION ENGINE
         * Запускається при завантаженні сторінки
         */
        document.addEventListener('DOMContentLoaded', () => {
            console.log(`%c EliteStore Engine v${EliteEngine.version} Initialized `, "background: #7b61ff; color: #fff; padding: 5px; border-radius: 5px;");
            
            // Відновлення налаштувань з LocalStorage
            loadPersistedState();
            
            // Первинний рендеринг інтерфейсу
            applyTranslations();
            renderGrid();
            
            // Ініціалізація 3D ефектів миші
            initGlobalParallax();
        });

        /**
         * STATE PERSISTENCE
         * Зберігає вибір мови та теми користувача
         */
        function loadPersistedState() {
            const savedLang = localStorage.getItem('elite_lang');
            const savedColor = localStorage.getItem('elite_theme');
            
            if (savedLang) EliteEngine.currentLang = savedLang;
            if (savedColor) {
                EliteEngine.accentColor = savedColor;
                document.documentElement.style.setProperty('--p-accent', savedColor);
                document.documentElement.style.setProperty('--p-accent-rgb', hexToRgb(savedColor));
            }
            
            updateActiveToggles();
        }

        function updateActiveToggles() {
            // Мова
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === EliteEngine.currentLang);
            });
            
            // Тема
            document.querySelectorAll('.color-dot').forEach(dot => {
                const dotColor = rgbToHex(dot.style.backgroundColor);
                dot.classList.toggle('active', dotColor === EliteEngine.accentColor);
            });
        }

        /**
         * RENDERING CORE
         * Створює картки петів на основі бази даних та фільтрів
         */
        function renderGrid() {
            const grid = document.getElementById('mainGrid');
            if (!grid) return;

            // Ефект зникнення перед оновленням
            grid.style.opacity = '0';
            
            setTimeout(() => {
                grid.innerHTML = '';
                
                const filteredData = PETS_DATABASE.filter(pet => {
                    const matchesFilter = EliteEngine.currentFilter === 'all' || pet.rarity === EliteEngine.currentFilter;
                    const matchesSearch = pet.name.toLowerCase().includes(EliteEngine.searchQuery.toLowerCase()) || 
                                         pet.event.toLowerCase().includes(EliteEngine.searchQuery.toLowerCase());
                    return matchesFilter && matchesSearch;
                });

                if (filteredData.length === 0) {
                    renderEmptyState(grid);
                } else {
                    filteredData.forEach((pet, index) => {
                        const card = createPetCard(pet, index);
                        grid.appendChild(card);
                    });
                }
                
                grid.style.opacity = '1';
            }, 200);
        }

        /**
         * COMPONENT CREATOR
         * Створює HTML-структуру однієї картки
         */
        function createPetCard(pet, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'pet-card';
            wrapper.style.animationDelay = `${index * 0.05}s`;
            
            const t = TRANSLATIONS[EliteEngine.currentLang];
            const badgeClass = `rarity-badge rarity-${pet.rarity}`;
            
            wrapper.innerHTML = `
                <div class="${badgeClass}">${pet.rarity}</div>
                <div class="pet-year-info">
                    <i class="fas fa-calendar-alt"></i> ${t.year_label}: ${pet.year}
                </div>
                <div class="pet-display">
                    <img src="pets.3/${pet.img}" alt="${pet.name}" onerror="this.src='https://via.placeholder.com/200?text=Pet+Icon'">
                </div>
                <h3 class="pet-name-h3">${pet.name}</h3>
                <button class="btn-action-primary" onclick="initTrade('${pet.name}')">
                    <i class="fab fa-telegram-plane"></i> ${t.sell_btn}
                </button>
            `;
            
            return wrapper;
        }

        function renderEmptyState(container) {
            const t = TRANSLATIONS[EliteEngine.currentLang];
            container.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-muted);">
                    <i class="fas fa-ghost" style="font-size: 80px; margin-bottom: 20px; opacity: 0.2;"></i>
                    <p style="font-size: 20px; font-weight: 700;">${t.no_results}</p>
                </div>
            `;
        }

        /**
         * INTERACTION ENGINE
         * Обробка модальних вікон та Telegram посилань
         */
        function initTrade(petName) {
            const t = TRANSLATIONS[EliteEngine.currentLang];
            const admin = "Elite_Admin";
            const message = encodeURIComponent(`${t.trade_msg} ${petName}`);
            const url = `https://t.me/${admin}?text=${message}`;
            
            // Відкриваємо в новій вкладці
            window.open(url, '_blank');
        }

        function openSupport() {
            const modal = document.getElementById('supportModal');
            if (modal) {
                modal.classList.add('active');
                EliteEngine.isModalOpen = true;
                document.body.style.overflow = 'hidden';
            }
        }

        function closeSupport() {
            const modal = document.getElementById('supportModal');
            if (modal) {
                modal.classList.remove('active');
                EliteEngine.isModalOpen = false;
                document.body.style.overflow = 'auto';
            }
        }

        /**
         * LANGUAGE & THEME CONTROLLERS
         */
        function switchLang(lang) {
            EliteEngine.currentLang = lang;
            localStorage.setItem('elite_lang', lang);
            
            applyTranslations();
            renderGrid();
            updateActiveToggles();
        }

        function applyTranslations() {
            const t = TRANSLATIONS[EliteEngine.currentLang];
            
            // Оновлення статичних елементів з data-lang
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (t[key]) el.innerText = t[key];
            });
            
            // Оновлення плейсхолдера пошуку
            const searchInput = document.getElementById('petSearch');
            if (searchInput) searchInput.placeholder = t.search_placeholder;
        }

        function updateTheme(color, el) {
            EliteEngine.accentColor = color;
            localStorage.setItem('elite_theme', color);
            
            document.documentElement.style.setProperty('--p-accent', color);
            document.documentElement.style.setProperty('--p-accent-rgb', hexToRgb(color));
            
            updateActiveToggles();
        }

        /**
         * UTILS: COLOR CONVERSION
         */
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '123, 97, 255';
        }

        function rgbToHex(rgb) {
            if (!rgb) return "#7b61ff";
            const res = rgb.match(/\d+/g);
            return "#" + ((1 << 24) + (+res[0] << 16) + (+res[1] << 8) + +res[2]).toString(16).slice(1);
        }

        /**
         * 3D PARALLAX ENGINE
         */
        function initGlobalParallax() {
            document.addEventListener('mousemove', (e) => {
                if (window.innerWidth < 1000) return;
                
                const cards = document.querySelectorAll('.pet-card');
                const x = (window.innerWidth / 2 - e.pageX) / 45;
                const y = (window.innerHeight / 2 - e.pageY) / 45;
                
                cards.forEach(card => {
                    const rect = card.getBoundingClientRect();
                    // Тільки якщо картка у видимій зоні
                    if (rect.top < window.innerHeight && rect.bottom > 0) {
                        card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg) translateY(-5px)`;
                    }
                });
            });
        }

        /**
         * SEARCH ENGINE WITH DEBOUNCE
         */
        let searchTimeout;
        function runSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                EliteEngine.searchQuery = document.getElementById('petSearch').value;
                renderGrid();
            }, 300);
        }

        function filterRarity(rarity) {
            EliteEngine.currentFilter = rarity;
            
            // Оновлення стилю кнопок навігації
            document.querySelectorAll('.nav-item').forEach(btn => {
                const onClick = btn.getAttribute('onclick');
                btn.classList.toggle('active', onClick && onClick.includes(rarity));
            });
            
            renderGrid();
        }
    </script>
