<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore Premium — Adopt Me Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #7d5fff;
            --accent-glow: rgba(125, 95, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        /* Анімований професійний фон */
        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            color: var(--text);
            overflow: hidden;
        }

        /* БОКОВА ПАНЕЛЬ (Glassmorphism) */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 32px;
            background: linear-gradient(to right, #ff7675, #7d5fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .nav-link {
            padding: 18px 25px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent);
            box-shadow: 0 10px 20px var(--accent-glow);
            transform: translateX(10px);
        }

        /* ОСНОВНИЙ КОНТЕНТ */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 50px;
            scroll-behavior: smooth;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 35px;
        }

        /* КАРТКА */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 35px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0; transition: 0.5s;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
        }

        .card:hover::before { opacity: 0.3; }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            position: relative; z-index: 1;
        }

        .card h3 { font-size: 22px; font-weight: 800; margin: 20px 0 10px; }
        .rarity { color: #ffeaa7; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        .sell-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 18px;
            margin-top: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            position: relative; z-index: 2;
        }

        /* МОДАЛЬНЕ ВІКНО (ОПИС) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal {
            background: #fff; color: #1a1a2e;
            width: 90%; max-width: 600px;
            border-radius: 40px; padding: 50px;
            position: relative; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal h2 { font-size: 38px; font-weight: 900; margin-bottom: 10px; }
        .modal p { font-size: 18px; line-height: 1.6; color: #555; margin-bottom: 30px; }
        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 30px; cursor: pointer; color: #ccc; background: none; border: none; }

        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE🐾STORE</div>
    <a href="#" class="nav-link active"><i class="fa-solid fa-dragon"></i> Усі пети</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-fire"></i> Легендарні</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-bolt"></i> Трейди</a>
    
    <div style="margin-top: auto; display: flex; gap: 10px;">
        <button onclick="setL('ua')" style="cursor:pointer; background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:10px;">UA</button>
        <button onclick="setL('ru')" style="cursor:pointer; background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:10px;">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target==this) closePet()">
    <div class="modal">
        <button class="close-btn" onclick="closePet()">✕</button>
        <img id="m-img" src="" style="width: 200px; margin-bottom: 20px;">
        <h2 id="m-name">Shadow Dragon</h2>
        <div id="m-rarity" class="rarity" style="color: #ff7675; margin-bottom: 20px;">Legendary</div>
        <p id="m-desc">Це один із найрідкісніших петів у грі. Його цінують за унікальний вигляд та історію.</p>
        <button class="sell-btn" style="padding: 20px; font-size: 20px;">ПРОДАТИ ЗАРАЗ</button>
    </div>
</div>

<script>
    const tr = {
        ua: { sell: "ПРОДАТИ", rar: "Легендарний", desc: "Детальний опис вихованця: це преміальний юніт для вашого інвентарю." },
        ru: { sell: "ПРОДАТЬ", rar: "Легендарный", desc: "Детальное описание питомца: это премиальный юнит для вашего инвентаря." }
    };

    let curL = 'ua';

    // УСІ 31 ПЕТ ПОВНІСТЮ
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Bat Dragon", img: "bat_dragon.png" },
        { name: "Giraffe", img: "giraffe.png" },
        { name: "Owl", img: "owl.png" },
        { name: "Parrot", img: "parrot.png" },
        { name: "Evil Unicorn", img: "evil_unicorn.png" },
        { name: "Crow", img: "crow.png" },
        { name: "Turtle", img: "turtle.png" },
        { name: "Kangaroo", img: "kangaroo.png" },
        { name: "Frost Fury", img: "frost_fury.png" },
        { name: "Arctic Reindeer", img: "arctic_reindeer.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "SS Bat Dragon", img: "winter_2022_strawberry_shortcake_bat_dragon.png" },
        { name: "Mechapup", img: "mechapup.png" },
        { name: "Diamond Amazon", img: "diamond_amazon.png" },
        { name: "Nessie", img: "nessie.png" },
        { name: "Capricorn", img: "capricorn.png" },
        { name: "Balloon Unicorn", img: "balloon_unicorn.png" },
        { name: "Corn Doggo", img: "corn_doggo.png" },
        { name: "Gargoyle", img: "urban_2023_gargoyle.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render() {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        pets.forEach(p => {
            c.innerHTML += `
                <div class="card" onclick="openPet('${p.name}')">
                    <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200?text=Pet'">
                    <div class="rarity">${tr[curL].rar}</div>
                    <h3>${p.name}</h3>
                    <button class="sell-btn">${tr[curL].sell}</button>
                </div>`;
        });
    }

    function openPet(name) {
        const p = pets.find(x => x.name === name);
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-rarity').innerText = tr[curL].rar;
        document.getElementById('m-desc').innerText = tr[curL].desc;
        document.getElementById('overlay').style.display = 'flex';
    }

    function closePet() { document.getElementById('overlay').style.display = 'none'; }

    function setL(l) { curL = l; render(); }

    render();
</script>

</body>
</html>
