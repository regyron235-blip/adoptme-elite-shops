<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore Professional — Adopt Me Marketplace</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="petdb.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --accent-light: #a29bfe;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --sidebar-bg: #0d1117;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #fff;
            --text-muted: #8b949e;
            --shadow-main: 0 10px 30px rgba(0,0,0,0.5);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.night-mode {
            --bg-dark: #020305;
            --card-bg: linear-gradient(180deg, #0a0e14 0%, #050709 100%);
            --sidebar-bg: #050709;
            --glass-border: rgba(255, 255, 255, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
            opacity: 1;
            transition: background 0.6s ease, color 0.6s ease;
        }

        .sidebar {
            width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 1000;
            transition: var(--transition), background 0.5s ease;
            overflow-y: auto;
        }

        .logo { 
            font-weight: 900; font-size: 26px; text-align: center; margin-bottom: 40px; 
            background: var(--accent); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            cursor: pointer; transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { 
            width: 100%; background: #05060a; border: 1px solid var(--glass-border); 
            padding: 14px 14px 14px 45px; border-radius: 12px; color: var(--text-main); font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .search-box input:focus { border-color: var(--accent-solid); box-shadow: 0 0 10px rgba(108, 92, 231, 0.3); }
        .search-box i { position: absolute; left: 16px; top: 16px; color: var(--accent-solid); font-size: 16px; transition: 0.3s; }

        .nav-link { 
            padding: 16px 20px; border-radius: 12px; color: var(--text-muted); 
            text-decoration: none; font-weight: 700; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 14px; cursor: pointer;
            transition: var(--transition);
        }
        .nav-link:hover { background: rgba(255,255,255,0.04); color: var(--text-main); transform: translateX(8px); }
        .nav-link.active { background: var(--accent); color: var(--text-main); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3); }
        .nav-link i { font-size: 18px; width: 20px; text-align: center; }

        .lang-switcher-sidebar { margin-top: auto; display: flex; gap: 10px; padding-top: 25px; border-top: 1px solid var(--glass-border); }
        .l-btn { 
            background: #161b22; border: 1px solid var(--glass-border); color: var(--text-muted); 
            padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: 700; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; 
        }
        .l-btn:hover { background: rgba(255,255,255,0.04); color: var(--text-main); }
        .l-btn.active-lang { background: var(--accent-solid); color: #fff; border-color: transparent; }

        .main { flex: 1; overflow-y: auto; padding: 40px; position: relative; scroll-behavior: smooth; }
        
        .mobile-menu-toggle {
            display: none; position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: var(--accent); border: none; color: #fff; 
            padding: 15px; border-radius: 12px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); transition: 0.3s ease;
        }
        .mobile-menu-toggle:hover { transform: scale(1.05); }

        .content-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--glass-border); }
        .tab-btn { 
            padding: 15px 25px; background: transparent; border: none; color: var(--text-muted); 
            cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.3s;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--accent-solid); border-bottom-color: var(--accent-solid); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; padding-bottom: 40px; }

        .card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            border-radius: 35px; padding: 30px; text-align: center; 
            cursor: pointer; position: relative; overflow: hidden;
            transition: var(--transition), border-color 0.5s ease;
        }

        .card:hover { transform: translateY(-12px); border-color: var(--accent-solid); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        .rarity-tag { font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #ff7675; margin-bottom: 8px; }

        .card img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); transition: transform 0.4s ease; }
        .card:hover img { transform: scale(1.05) rotate(2deg); }
        
        .pet-name { font-size: 17px; font-weight: 900; margin-bottom: 20px; color: var(--text-main); min-height: 40px; display: flex; align-items: center; justify-content: center; }

        .tg-btn { 
            background: #0088cc; color: #fff !important; text-decoration: none; 
            padding: 14px; width: 100%; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .tg-btn:hover { background: #00aaff; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4); transform: translateY(-2px); }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; 
            z-index: 2000; backdrop-filter: blur(10px); 
            opacity: 0; transition: opacity 0.4s ease;
        }
        .overlay.open { opacity: 1; display: flex !important; }

        .modal { 
            background: #161b22; color: var(--text-main); width: 90%; max-width: 500px; 
            border-radius: 35px; padding: 45px; position: relative; text-align: center; 
            border: 1px solid var(--glass-border); box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            transform: scale(0.8) translateY(20px); transition: var(--transition);
            max-height: 80vh; overflow-y: auto;
        }
        .overlay.open .modal { transform: scale(1) translateY(0); }

        .close-btn { 
            position: absolute; top: 22px; right: 22px; font-size: 26px; cursor: pointer; 
            color: var(--text-muted); transition: 0.3s; padding: 5px; 
        }
        .close-btn:hover { color: #fff; transform: rotate(90deg); }

        /* ШІ ПОМІЧНИК */
        .ai-container { max-width: 700px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; height: calc(100vh - 100px); }
        .ai-header { text-align: center; margin-bottom: 20px; }
        .ai-header-icon { font-size: 50px; margin-bottom: 10px; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-header h1 { font-size: 24px; font-weight: 900; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-header p { color: var(--text-muted); font-size: 13px; margin-top: 5px; }
        .ai-messages {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
            padding: 15px; background: rgba(13,17,23,0.6); border-radius: 16px;
            border: 1px solid var(--glass-border); margin-bottom: 15px;
        }
        .ai-msg { padding: 12px 16px; border-radius: 14px; max-width: 85%; font-size: 13px; line-height: 1.6; animation: fadeIn 0.3s ease; }
        .ai-msg.bot {
            background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(162,155,254,0.1));
            border: 1px solid rgba(108,92,231,0.3); align-self: flex-start; color: #c9d1d9;
        }
        .ai-msg.user { background: var(--accent); color: #fff; align-self: flex-end; font-weight: 600; }
        .ai-input-row { display: flex; gap: 10px; align-items: center; }
        .ai-input {
            flex: 1; padding: 14px 18px; background: rgba(13,17,23,0.8);
            border: 1px solid var(--glass-border); border-radius: 14px;
            color: #fff; font-family: inherit; font-size: 14px; outline: none;
            transition: var(--transition);
        }
        .ai-input:focus { border-color: var(--accent-solid); box-shadow: 0 0 15px rgba(108,92,231,0.2); }
        .ai-send-btn {
            width: 48px; height: 48px; border-radius: 14px; border: none;
            background: var(--accent); color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); flex-shrink: 0;
        }
        .ai-send-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108,92,231,0.4); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .lang-modal-overlay {
            position: fixed; inset: 0; background: rgba(5, 6, 10, 0.98);
            z-index: 3000; display: none; flex-direction: column; padding: 60px 40px;
            overflow-y: auto; backdrop-filter: blur(15px);
            opacity: 0; transition: opacity 0.5s ease;
        }
        .lang-modal-overlay.open { opacity: 1; display: flex !important; }

        .lang-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; max-width: 1000px; width: 100%; margin-left: auto; margin-right: auto; }
        .lang-modal-title { font-size: 28px; font-weight: 900; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .lang-search { max-width: 400px; width: 100%; position: relative; }
        .lang-search input { width: 100%; background: #161b22; border: 1px solid var(--glass-border); padding: 14px 14px 14px 45px; border-radius: 12px; color: #fff; }
        .lang-search i { position: absolute; left: 16px; top: 16px; color: var(--accent-solid); }

        .lang-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; 
            max-width: 1000px; width: 100%; margin-left: auto; margin-right: auto;
        }

        .lang-item {
            background: #161b22; border: 1px solid var(--glass-border); padding: 18px; 
            border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            transition: var(--transition);
        }
        .lang-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.2); transform: translateY(-5px) scale(1.03); }
        .lang-item.active-choice { border-color: var(--accent-solid); background: rgba(108, 92, 231, 0.05); }
        .lang-flag { font-size: 24px; }
        .lang-name-container { display: flex; flex-direction: column; }
        .lang-main-name { font-weight: 700; font-size: 15px; color: #fff; }
        .lang-local-name { font-size: 12px; color: var(--text-muted); font-weight: 300; }

        @media (max-width: 768px) {
            .sidebar { width: 250px; padding: 20px; }
            .main { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="logo" onclick="location.reload()">ELITE STORE</div>
    
    <div class="nav-link active" onclick="showTab('pets')">
        <i class="fa-solid fa-paw"></i> <span>Усі пети</span>
    </div>

    <div class="nav-link" onclick="showTab('ai')">
        <i class="fa-solid fa-robot"></i> <span>ШІ Помічник</span>
    </div>
    
    <div class="lang-switcher-sidebar">
        <button onclick="setQuickLang('ua')" id="ua-btn" class="l-btn active-lang">
            <span>🇺🇦</span> UA
        </button>
        <button onclick="openAllLanguages()" id="eu-btn" class="l-btn">
            <span>🌐</span> ALL
        </button>
    </div>
</div>

<div class="main" id="mainContent">
    <div class="tab-content active" id="pets-tab">
        <div class="grid" id="catalog"></div>
    </div>

    <div class="tab-content" id="ai-tab">
        <div class="ai-container">
            <div class="ai-header">
                <div class="ai-header-icon"><i class="fa-solid fa-robot"></i></div>
                <h1 id="ai-title">ШІ Помічник</h1>
                <p id="ai-subtitle">Запитай мене про будь-якого пета з Adopt Me!</p>
            </div>
            <div class="ai-messages" id="aiMessages">
                <div class="ai-msg bot" id="ai-welcome">👋 Привіт! Я ШІ-помічник EliteStore. Напиши назву будь-якого пета з Adopt Me!</div>
            </div>
            <div class="ai-input-row">
                <input type="text" class="ai-input" id="aiInput" placeholder="Напиши назву пета..." onkeypress="if(event.key==='Enter')sendAiMessage()">
                <button class="ai-send-btn" onclick="sendAiMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="petOverlay" onclick="if(event.target===this)closePet()">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closePet()"></i>
        <img id="m-img" src="" style="width:170px; margin-bottom: 15px;">
        <h2 id="m-name" style="font-weight: 900; font-size: 22px;"></h2>
        <p id="m-desc" style="color:var(--text-muted); margin: 20px 0; font-size:14px;"></p>
        <a href="https://t.me/zeop_252" target="_blank" class="tg-btn">
            <i class="fa-brands fa-telegram"></i> <span id="m-sell-txt">ПРОДАТЬ</span>
        </a>
    </div>
</div>

<div class="lang-modal-overlay" id="langModalOverlay">
    <div class="lang-modal-header">
        <h1 class="lang-modal-title" id="lang-select-title">Виберіть мову</h1>
        <i class="fa-solid fa-xmark close-btn" onclick="closeAllLanguages()" style="position: static; font-size: 30px; cursor: pointer;"></i>
    </div>
    <div class="lang-grid" id="langGrid"></div>
</div>

<script src="news.js"></script>
<script>
    const translations = {
        ua: { sell: "ПРОДАТЬ", petYear: "Рік", petEv: "Подія" },
        en: { sell: "SELL", petYear: "Year", petEv: "Event" },
        pl: { sell: "SPRZEDAJ", petYear: "Rok", petEv: "Wydanie" },
        de: { sell: "VERKAUFEN", petYear: "Jahr", petEv: "Veranstaltung" },
        fr: { sell: "VENDRE", petYear: "Année", petEv: "Événement" },
        es: { sell: "VENDER", petYear: "Año", petEv: "Evento" },
        it: { sell: "VENDI", petYear: "Anno", petEv: "Evento" },
        pt: { sell: "VENDER", petYear: "Ano", petEv: "Evento" },
        tr: { sell: "SAT", petYear: "Yıl", petEv: "Etkinlik" },
        ja: { sell: "売却", petYear: "年", petEv: "イベント" },
        ko: { sell: "판매", petYear: "년", petEv: "이벤트" },
        gr: { sell: "ΠΩΛΗΣΗ", petYear: "Έτος", petEv: "Εκδήλωση" },
        nl: { sell: "VERKOPEN", petYear: "Jaar", petEv: "Evenement" },
        sv: { sell: "SÄLJ", petYear: "År", petEv: "Evenemang" },
        cs: { sell: "PRODAT", petYear: "Rok", petEv: "Událost" },
        ro: { sell: "VINDE", petYear: "An", petEv: "Eveniment" },
        da: { sell: "SÆLG", petYear: "År", petEv: "Begivenhed" },
        fi: { sell: "MYY", petYear: "Vuosi", petEv: "Tapahtuma" },
        ar: { sell: "بيع", petYear: "السنة", petEv: "الحدث" },
        zh: { sell: "出售", petYear: "年份", petEv: "活动" }
    };

    const languagesDB = [
        { code: 'ua', flag: '🇺🇦', name: 'Ukrainian', local: 'Українська' },
        { code: 'en', flag: '🇺🇸', name: 'English', local: 'English' },
        { code: 'pl', flag: '🇵🇱', name: 'Polish', local: 'Polski' },
        { code: 'de', flag: '🇩🇪', name: 'German', local: 'Deutsch' },
        { code: 'fr', flag: '🇫🇷', name: 'French', local: 'Français' },
        { code: 'es', flag: '🇪🇸', name: 'Spanish', local: 'Español' },
        { code: 'it', flag: '🇮🇹', name: 'Italian', local: 'Italiano' },
        { code: 'pt', flag: '🇵🇹', name: 'Portuguese', local: 'Português' },
        { code: 'tr', flag: '🇹🇷', name: 'Turkish', local: 'Türkçe' },
        { code: 'nl', flag: '🇳🇱', name: 'Dutch', local: 'Nederlands' },
        { code: 'sv', flag: '🇸🇪', name: 'Swedish', local: 'Svenska' },
        { code: 'da', flag: '🇩🇰', name: 'Danish', local: 'Dansk' },
        { code: 'fi', flag: '🇫🇮', name: 'Finnish', local: 'Suomi' },
        { code: 'cs', flag: '🇨🇿', name: 'Czech', local: 'Čeština' },
        { code: 'ro', flag: '🇷🇴', name: 'Romanian', local: 'Română' },
        { code: 'gr', flag: '🇬🇷', name: 'Greek', local: 'Ελληνικά' },
        { code: 'ar', flag: '🇸🇦', name: 'Arabic', local: 'العربية' },
        { code: 'zh', flag: '🇨🇳', name: 'Chinese', local: '中文' },
        { code: 'ja', flag: '🇯🇵', name: 'Japanese', local: '日本語' },
        { code: 'ko', flag: '🇰🇷', name: 'Korean', local: '한국어' }
    ];

    const pets = [
        { id: 1, name: "Shadow Dragon", year: "2019", ev: "Halloween", ua: "Тіньовий дракон", en: "Shadow Dragon", pl: "Smok cienia", de: "Schattendrache", fr: "Dragon d'ombre", es: "Dragón de Sombra", it: "Drago dell'Ombra", pt: "Dragão da Sombra", tr: "Gölge Ejderi", ja: "シャドウドラゴン", ko: "섀도우 드래곤" },
        { id: 2, name: "Frost Dragon", year: "2019", ev: "Christmas", ua: "Крижаний дракон", en: "Frost Dragon", pl: "Lodowy smok", de: "Frost-Drache", fr: "Dragon de glace", es: "Dragón de Hielo", it: "Drago del Gelo", pt: "Dragão de Gelo", tr: "Frost Ejderi", ja: "フロストドラゴン", ko: "프로스트 드래곤" },
        { id: 3, name: "Bat Dragon", year: "2019", ev: "Halloween", ua: "Кажан дракон", en: "Bat Dragon", pl: "Smok-nietoperz", de: "Fledermaus-Drache", fr: "Dragon chauve-souris", es: "Dragón Murciélago", it: "Drago Pipistrello", pt: "Dragão Morcego", tr: "Yarasa Ejderi", ja: "バットドラゴン", ko: "박쥐 드래곤" }
    ];

    let currentLang = localStorage.getItem('elite_lang') || 'ua';
    let allNews = [];
    let aiChatHistory = [];

    function render(data) {
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        
        data.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openPetModal(p.name, p);
            
            const langPack = translations[currentLang] || translations['en'];
            const petName = p[currentLang] || p.name;
            card.innerHTML = `
                <div class="rarity-tag">LEGENDARY</div>
                <div style="font-size:9px; color:var(--text-muted); margin-bottom:12px; font-weight:300;">
                    ${langPack.petYear}: ${p.year}
                </div>
                <img src="https://via.placeholder.com/130/161b22/fff?text=${petName}" onerror="this.src='https://via.placeholder.com/130/161b22/fff?text=PET'">
                <div class="pet-name">${petName}</div>
                <a href="https://t.me/zeop_252" target="_blank" class="tg-btn" onclick="event.stopPropagation()">
                    <i class="fa-brands fa-telegram"></i> <span>${langPack.sell}</span>
                </a>
            `;
            c.appendChild(card);
        });
    }

    function openPetModal(name, pet) {
        const langPack = translations[currentLang] || translations['en'];
        const petName = pet[currentLang] || pet.name;
        
        document.getElementById('m-img').src = 'https://via.placeholder.com/170/161b22/fff?text=' + petName;
        document.getElementById('m-name').innerText = petName;
        document.getElementById('m-desc').innerText = `${langPack.petYear}: ${pet.year} | ${langPack.petEv}: ${pet.ev}`;
        document.getElementById('m-sell-txt').innerText = langPack.sell;
        
        openOverlay('petOverlay');
    }

    function closePet() { 
        document.getElementById('petOverlay').classList.remove('open');
    }

    function openOverlay(id) {
        const overlay = document.getElementById(id);
        overlay.classList.add('open');
    }

    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(tabName + '-tab').classList.add('active');
    }

    function setQuickLang(code) { 
        changeLang(code);
    }

    function changeLang(code) {
        currentLang = code;
        localStorage.setItem('elite_lang', code);
        document.getElementById('ua-btn').classList.toggle('active-lang', code === 'ua');
        document.getElementById('eu-btn').classList.toggle('active-lang', code !== 'ua');
        render(pets);
        closeAllLanguages();
    }

    function openAllLanguages() {
        generateLangGrid();
        document.getElementById('langModalOverlay').classList.add('open');
    }

    function closeAllLanguages() {
        document.getElementById('langModalOverlay').classList.remove('open');
    }

    function generateLangGrid() {
        const grid = document.getElementById('langGrid');
        grid.innerHTML = '';
        languagesDB.forEach(l => {
            const item = document.createElement('div');
            item.className = `lang-item ${l.code === currentLang ? 'active-choice' : ''}`;
            item.onclick = () => { changeLang(l.code); };
            item.innerHTML = `
                <div class="lang-flag">${l.flag}</div>
                <div class="lang-name-container">
                    <div class="lang-main-name">${l.name}</div>
                    <div class="lang-local-name">${l.local}</div>
                </div>
            `;
            grid.appendChild(item);
        });
    }

    const aiChatHistory = [];
    const _k = ['gsk','_wI7r5v2DTTRrY8lJ7KcV','WGdyb3FYXKJ7FhqN6Lvm','AQPNRr0FmysO'];
    function getGroqKey() { return _k.join('') || localStorage.getItem('groq_key') || ''; }

    function sendAiMessage() {
        const input = document.getElementById('aiInput');
        const query = input.value.trim();
        if (!query) return;
        input.value = '';
        const msgs = document.getElementById('aiMessages');
        
        const userMsg = document.createElement('div');
        userMsg.className = 'ai-msg user';
        userMsg.textContent = query;
        msgs.appendChild(userMsg);
        msgs.scrollTop = msgs.scrollHeight;

        const typingMsg = document.createElement('div');
        typingMsg.className = 'ai-msg bot';
        typingMsg.innerHTML = '⏳ ...';
        typingMsg.id = 'ai-typing';
        msgs.appendChild(typingMsg);
        msgs.scrollTop = msgs.scrollHeight;

        const langName = { 
            ua:'Ukrainian', en:'English', pl:'Polish', de:'German', fr:'French', 
            es:'Spanish', it:'Italian', pt:'Portuguese', tr:'Turkish', ja:'Japanese', 
            ko:'Korean', gr:'Greek', nl:'Dutch', sv:'Swedish', cs:'Czech', ro:'Romanian', 
            da:'Danish', fi:'Finnish', ar:'Arabic', zh:'Chinese' 
        }[currentLang] || 'English';

        const systemPrompt = `You are EliteStore AI assistant for Adopt Me (Roblox) pet marketplace.
**ALWAYS answer in ${langName} language. NEVER use other languages.**
Help users with pet values and trading advice. Be friendly and concise.`;

        aiChatHistory.push({ role: 'user', content: query });

        const groqKey = getGroqKey();
        if (!groqKey) {
            const el = document.getElementById('ai-typing');
            if (el) el.remove();
            const botMsg = document.createElement('div');
            botMsg.className = 'ai-msg bot';
            botMsg.innerHTML = '❌ API key not configured. Please contact admin.';
            msgs.appendChild(botMsg);
            msgs.scrollTop = msgs.scrollHeight;
            return;
        }

        fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + groqKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'llama-3.1-8b-instant',
                messages: [{ role: 'system', content: systemPrompt }, ...aiChatHistory.slice(-10)],
                max_tokens: 500,
                temperature: 0.7
            })
        })
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('ai-typing');
            if (el) el.remove();
            if (data.choices && data.choices[0]) {
                const botMsg = document.createElement('div');
                botMsg.className = 'ai-msg bot';
                botMsg.innerHTML = data.choices[0].message.content || 'Error';
                msgs.appendChild(botMsg);
                aiChatHistory.push({ role: 'assistant', content: data.choices[0].message.content });
            }
            msgs.scrollTop = msgs.scrollHeight;
        })
        .catch(e => {
            const el = document.getElementById('ai-typing');
            if (el) el.remove();
            const botMsg = document.createElement('div');
            botMsg.className = 'ai-msg bot';
            botMsg.innerHTML = '❌ Error: ' + e.message;
            msgs.appendChild(botMsg);
            msgs.scrollTop = msgs.scrollHeight;
        });
    }

    window.onload = () => {
        render(pets);
        showTab('pets');
        generateLangGrid();
        document.getElementById('ua-btn').classList.add('active-lang');
    };
</script>
