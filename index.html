<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Ultra High-End</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #7d5fff;
            --color2: #ff4dff;
            --color3: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* ТІ САМІ "ВАЖКІ" ГРАДІЄНТИ НА ФОНІ */
        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000; overflow: hidden;
        }

        .blob {
            position: absolute; width: 800px; height: 800px;
            filter: blur(120px); border-radius: 50%; opacity: 0.5;
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 { background: var(--color1); top: -20%; left: -10%; }
        .blob-2 { background: var(--color2); bottom: -20%; right: -10%; animation-delay: -5s; }
        .blob-3 { background: var(--color3); top: 40%; left: 30%; animation-duration: 18s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(20vw, 15vh) scale(1.3) rotate(180deg); }
            100% { transform: translate(-10vw, 30vh) scale(0.9) rotate(360deg); }
        }

        .main { padding: 40px 20px; position: relative; z-index: 10; }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .subtitle {
            text-align: center; color: #888;
            letter-spacing: 8px; font-size: 12px; margin-bottom: 60px;
        }

        /* СІТКА КАРТОК */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 35px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* КАРТКА З АНІМАЦІЄЮ "ЛЕВІТАЦІЇ" */
        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation: levitate 5s ease-in-out infinite;
            position: relative;
        }

        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .card:hover {
            transform: scale(1.05) translateY(-20px) rotateX(5deg);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(125, 95, 255, 0.2);
        }

        .card img {
            width: 140px; height: 140px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: 0.5s;
        }

        .card:hover img { transform: scale(1.1) rotate(-5deg); }

        .pet-name {
            font-size: 16px; font-weight: 900; color: #eee;
            margin-bottom: 20px; text-transform: uppercase;
        }

        /* КНОПКА З РУХОМИМ ГРАДІЄНТОМ */
        .tg-btn {
            display: block; padding: 14px;
            background: linear-gradient(90deg, #7d5fff, #ff4dff, #00d2ff, #7d5fff);
            background-size: 300%;
            border-radius: 18px; color: white; text-decoration: none;
            font-size: 11px; font-weight: 900;
            transition: 0.4s;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        .tg-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--color1);
        }

        /* Різні затримки для ефекту несинхронності */
        .card:nth-child(2n) { animation-delay: 0.5s; }
        .card:nth-child(3n) { animation-delay: 1.2s; }

    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="main">
        <h1>ELITE STORE</h1>
        <div class="subtitle">ULTRA PREMIUM INVENTORY</div>

        <div class="grid" id="catalog">
            </div>
    </div>

<script>
    // Твій список із 32 петів
    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" },
        { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" },
        { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" },
        { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" },
        { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    const catalog = document.getElementById('catalog');

    pets.forEach(pet => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div style="color:var(--color2); font-size:10px; margin-bottom:15px;">LEGENDARY ITEM</div>
            <img src="${pet.img}" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=${pet.name}'">
            <div class="pet-name">${pet.name}</div>
            <a href="https://t.me/your_tg" target="_blank" class="tg-btn">SEND OFFER</a>
        `;
        catalog.appendChild(card);
    });
</script>

</body>
</html>
