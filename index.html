<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Full Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #7d5fff;
            --color2: #ff4dff;
            --color3: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #050505; color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* ТИЙ САМИЙ ГРАДІЄНТНИЙ ФОН */
        .bg-wrapper {
            position: fixed; inset: 0; z-index: -1; background: #000; overflow: hidden;
        }
        .blob {
            position: absolute; width: 700px; height: 700px; filter: blur(100px);
            border-radius: 50%; opacity: 0.4; animation: move 15s infinite alternate ease-in-out;
        }
        .blob-1 { background: var(--color1); top: -10%; left: -10%; }
        .blob-2 { background: var(--color2); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.2); }
        }

        /* HEADER & CONTROLS */
        .header { padding: 40px 20px; text-align: center; }
        h1 {
            font-size: clamp(40px, 8vw, 70px); margin-bottom: 25px;
            background: linear-gradient(to bottom, #fff 40%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            max-width: 500px; margin: 0 auto 50px;
        }

        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 15px 15px 45px; border-radius: 15px; color: #fff; font-size: 14px; outline: none;
            transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--color1); background: rgba(255,255,255,0.1); }
        .search-container i { position: absolute; left: 18px; top: 18px; color: #666; }

        .top-btns { display: flex; gap: 10px; }
        .btn-action {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover, .btn-action.active { background: var(--color1); border-color: var(--color1); transform: translateY(-2px); }

        /* GRID */
        .main { padding: 0 20px 50px; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }

        /* CARDS */
        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px;
            padding: 30px; text-align: center; transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--color2); }
        .card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; transition: 0.4s; }
        .card:hover img { transform: scale(1.1); }
        .pet-name { font-size: 16px; font-weight: 900; margin-bottom: 20px; color: #fff; text-transform: uppercase; }

        .tg-link {
            display: block; padding: 15px; background: linear-gradient(90deg, var(--color1), var(--color2));
            border-radius: 15px; color: white; text-decoration: none; font-size: 11px; font-weight: 900;
            text-transform: uppercase; transition: 0.3s;
        }
        .tg-link:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(125, 95, 255, 0.4); }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-box { background: #111; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid #333; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="header">
        <h1>ELITE STORE</h1>
        <div class="controls">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
            </div>
            <div class="top-btns">
                <button class="btn-action" onclick="toggleM(true)" id="sup-btn">Підтримка</button>
                <button class="btn-action active" onclick="setL('ua')" id="ua-btn">UA</button>
                <button class="btn-action" onclick="setL('ru')" id="ru-btn">RU</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="grid" id="catalog"></div>
    </div>

    <div class="modal" id="m">
        <div class="modal-box">
            <h2 id="m-title" style="margin-bottom: 15px;">SUPPORT</h2>
            <p id="m-text" style="color: #888; margin-bottom: 25px;">Пишіть нам в Telegram</p>
            <a href="https://t.me/your_tg" target="_blank" class="tg-link">Telegram</a>
            <div onclick="toggleM(false)" style="margin-top: 20px; cursor: pointer; color: #444; font-size: 11px;">[ ЗАКРИТИ ]</div>
        </div>
    </div>

<script>
    const lang = {
        ua: { search: "Пошук...", support: "Підтримка", buy: "Send Offer", mTitle: "ПІДТРИМКА", mText: "Маєте питання? Пишіть нам!" },
        ru: { search: "Поиск...", support: "Поддержка", buy: "Send Offer", mTitle: "ПОДДЕРЖКА", mText: "Есть вопросы? Пишите нам!" }
    };
    let curL = 'ua';

    const pets = [
        { name: "Shadow Dragon", img: "shadow_dragon.png" }, { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Diamond Butterfly", img: "sanctuary_2022_diamond_premium_butterfly.png" }, { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" }, { name: "Axolotl", img: "axolotl.png" },
        { name: "Mechapup", img: "april_fools_2022_mechapup.png" }, { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" }, { name: "Dodo", img: "dodo.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" }, { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" }, { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" }, { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Goldhorn", img: "goldhorn.png" }, { name: "Guardian Lion", img: "guardian_lion.png" },
        { name: "Vampire Dragon", img: "halloween_2023_vampire_dragon.png" }, { name: "King Bee", img: "king_bee.png" },
        { name: "Kitsune", img: "kitsune.png" }, { name: "Midnight Dragon", img: "lunar_2024_midnight_dragon.png" },
        { name: "Octopus", img: "octopus.png" }, { name: "Peacock", img: "peacock.png" },
        { name: "Phoenix", img: "phoenix.png" }, { name: "Queen Bee", img: "queen_bee.png" },
        { name: "Diamond Amazon", img: "rain_2023_diamond_amazon.png" }, { name: "Robo Dog", img: "robo_dog.png" },
        { name: "Shark", img: "shark.png" }, { name: "Capricorn", img: "space_house_2022_capricorn.png" },
        { name: "Corn Doggo", img: "summerfest_2024_corn_doggo.png" }, { name: "T-Rex", img: "trex.png" }
    ];

    function render(data = pets) {
        const cat = document.getElementById('catalog');
        cat.innerHTML = '';
        data.forEach(p => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
                <div style="color:var(--color2); font-size:9px; font-weight:900; margin-bottom:15px;">LEGENDARY</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/140/111/fff?text=${p.name}'">
                <div class="pet-name">${p.name}</div>
                <a href="https://t.me/your_tg" target="_blank" class="tg-link">${lang[curL].buy}</a>
            `;
            cat.appendChild(d);
        });
    }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        curL = l;
        document.getElementById('ua-btn').classList.toggle('active', l === 'ua');
        document.getElementById('ru-btn').classList.toggle('active', l === 'ru');
        document.getElementById('searchInput').placeholder = lang[l].search;
        document.getElementById('sup-btn').innerText = lang[l].support;
        document.getElementById('m-title').innerText = lang[l].mTitle;
        document.getElementById('m-text').innerText = lang[l].mText;
        render();
    }

    function toggleM(s) { document.getElementById('m').classList.toggle('active', s); }

    render();
</script>
</body>
</html>
