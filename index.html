<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Adopt Me</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-solid: #6c5ce7;
            --bg-dark: #05060a;
            --card-bg: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: #fff;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px; background: #0d1117; border-right: 1px solid var(--glass-border);
            padding: 40px 25px; display: flex; flex-direction: column; z-index: 1000;
        }

        .logo { 
            font-weight: 900; font-size: 24px; text-align: center; margin-bottom: 40px; 
            background: linear-gradient(90deg, #a29bfe, #6c5ce7); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { 
            width: 100%; background: #05060a; border: 1px solid var(--glass-border); 
            padding: 12px 12px 12px 40px; border-radius: 12px; color: #fff; outline: none; 
        }
        .search-box i { position: absolute; left: 15px; top: 14px; color: var(--accent-solid); }

        .nav-link { 
            padding: 15px 20px; border-radius: 12px; color: #8b949e; 
            text-decoration: none; font-weight: 700; margin-bottom: 10px; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        .lang-switcher { margin-top: auto; display: flex; gap: 10px; padding-top: 20px; }
        .l-btn { background: #161b22; border: 1px solid var(--glass-border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: 700; }
        .l-btn.active { background: var(--accent-solid); }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            border-radius: 30px; padding: 25px; text-align: center; transition: 0.4s; cursor: pointer;
        }
        .card:hover { transform: translateY(-10px); border-color: #6c5ce7; }
        .card img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; }
        .pet-name { font-weight: 900; margin-bottom: 15px; font-size: 15px; height: 35px; display: flex; align-items: center; justify-content: center; }

        .tg-btn { 
            background: #0088cc; color: #fff !important; text-decoration: none; 
            padding: 12px; width: 100%; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            font-weight: 800; font-size: 11px; text-transform: uppercase; 
        }

        /* --- MODALS --- */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; 
            z-index: 2000; backdrop-filter: blur(10px); 
        }
        .modal { 
            background: #161b22; color: #fff; width: 90%; max-width: 400px; 
            border-radius: 35px; padding: 40px; position: relative; text-align: center; 
            border: 1px solid var(--glass-border); 
        }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #8b949e; }
        .info-tag { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin: 15px 0; font-size: 13px; color: #a29bfe; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ELITE STORE</div>
    
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Пошук...">
    </div>

    <div class="nav-link active" onclick="render(pets)"><span>Усі пети</span></div>
    
    <div class="nav-link" style="border: 1px solid #6c5ce7; color: #6c5ce7;" onclick="openSupport()">
        <i class="fa-solid fa-headset"></i> <span id="side-sup">Підтримка</span>
    </div>
    
    <div class="lang-switcher">
        <button onclick="setL('ua')" id="ua-btn" class="l-btn active">UA</button>
        <button onclick="setL('ru')" id="ru-btn" class="l-btn">RU</button>
    </div>
</div>

<div class="main">
    <div class="grid" id="catalog"></div>
</div>

<div class="overlay" id="supportOverlay" onclick="if(event.target==this) closeSupport()">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closeSupport()"></i>
        <div style="font-size: 50px; color: #6c5ce7; margin-bottom: 20px;"><i class="fa-solid fa-circle-question"></i></div>
        <h2 id="sup-title">Підтримка</h2>
        <p id="sup-desc" style="color: #8b949e; margin: 15px 0 25px; line-height: 1.5;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn" id="sup-btn"></a>
    </div>
</div>

<div class="overlay" id="petOverlay" onclick="if(event.target==this) closePet()">
    <div class="modal">
        <i class="fa-solid fa-xmark close-btn" onclick="closePet()"></i>
        <img id="m-img" src="" style="width:150px;">
        <h2 id="m-name" style="margin-top:15px;"></h2>
        <div class="info-tag" id="m-info"></div>
        <p id="m-desc" style="color:#8b949e; margin-bottom:25px; font-size:14px;"></p>
        <a href="https://t.me/your_tg" target="_blank" class="tg-btn" id="m-btn"></a>
    </div>
</div>

        { name: "Snow Owl", file: "pets.3/snow_owl.png", year: "2020", event: "Winter", ua: "Сніжна сова.", ru: "Снежная сова." },

        { name: "Albino Monkey", file: "albino_monkey.png", year: "2020", event: "Monkey Fair", ua: "Мавпа альбінос.", ru: "Обезьяна альбинос." },

    function render(data) {
        document.getElementById('searchInput').placeholder = lang[cur].search;
        document.getElementById('side-sup').innerText = lang[cur].sup;
        const c = document.getElementById('catalog');
        c.innerHTML = '';
        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openPet(p.name);
            card.innerHTML = `
                <div style="font-size:10px; color:#8b949e; margin-bottom:10px;">${lang[cur].year}: ${p.year}</div>
                <img src="${p.file}" onerror="this.src='https://via.placeholder.com/120/161b22/fff?text=PET'">
                <div class="pet-name">${p.name}</div>
                <div class="tg-btn"><i class="fa-brands fa-telegram"></i> ${lang[cur].sell}</div>
            `;
            c.appendChild(card);
        });
    }

    function openPet(name) {
        const p = pets.find(x => x.name === name);
        document.getElementById('m-img').src = p.file;
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-info').innerText = `${lang[cur].year}: ${p.year} | ${lang[cur].event}: ${p.event}`;
        document.getElementById('m-desc').innerText = cur === 'ua' ? p.ua : p.ru;
        document.getElementById('m-btn').innerHTML = `<i class="fa-brands fa-telegram"></i> ${lang[cur].sell}`;
        document.getElementById('petOverlay').style.display = 'flex';
    }

    function closePet() { document.getElementById('petOverlay').style.display = 'none'; }

    function openSupport() {
        document.getElementById('sup-title').innerText = lang[cur].supTitle;
        document.getElementById('sup-desc').innerText = lang[cur].supDesc;
        document.getElementById('sup-btn').innerHTML = `<i class="fa-brands fa-telegram"></i> ${lang[cur].supBtn}`;
        document.getElementById('supportOverlay').style.display = 'flex';
    }

    function closeSupport() { document.getElementById('supportOverlay').style.display = 'none'; }

    function handleSearch() {
        const v = document.getElementById('searchInput').value.toLowerCase();
        render(pets.filter(p => p.name.toLowerCase().includes(v)));
    }

    function setL(l) {
        cur = l;
        document.getElementById('ua-btn').classList.toggle('active', l === 'ua');
        document.getElementById('ru-btn').classList.toggle('active', l === 'ru');
        render(pets);
    }

    render(pets);
</script>
</body>
</html>
