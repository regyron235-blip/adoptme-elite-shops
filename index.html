<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStore — Premium Adopt Me Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7d5fff; --tg: #229ED9; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff; min-height: 100vh; overflow-x: hidden; }
        header { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: var(--primary); box-shadow: 0 0 15px rgba(125, 95, 255, 0.5); }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        .pet-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.15); transition: 0.4s; text-align: center; cursor: pointer; }
        .pet-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.2); }
        .pet-card img { width: 100%; height: 180px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        
        /* МОДАЛЬНЕ ВІКНО (ОПИС) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: white; color: #333; width: 90%; max-width: 500px; border-radius: 30px; padding: 30px; position: relative; text-align: center; animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: #999; border: none; background: none; }
        .modal img { width: 150px; margin-bottom: 15px; }
        .buy-btn { background: var(--primary); color: white; text-decoration: none; padding: 15px; border-radius: 15px; display: block; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">🐾 ELITESTORE</div>
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ua')">UA</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
</header>

<div class="catalog" id="petContainer"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <img id="modalImg" src="" alt="">
        <h2 id="modalName">Name</h2>
        <p id="modalDesc">Description</p>
        <a href="https://t.me/your_tg" class="buy-btn" id="buyBtn">КУПИТИ</a>
    </div>
</div>

<script>
    const translations = {
        ua: { buy: "КУПИТИ", rarity: "Легендарний", defDesc: "Найкращий вибір для колекції!" },
        ru: { buy: "КУПИТЬ", rarity: "Легендарный", defDesc: "Лучший выбор для коллекции!" },
        en: { buy: "BUY NOW", rarity: "Legendary", defDesc: "The best choice for collection!" }
    };

    let currentLang = 'ua';

    // УСІ 31 ПЕТ
    const petData = [
        { name: "Shadow Dragon", img: "shadow_dragon.png", ua: "Найрідкісніший дракон.", ru: "Самый редкий дракон.", en: "The rarest dragon." },
        { name: "Bat Dragon", img: "bat_dragon.png", ua: "Хелловін 2019.", ru: "Хэллоуин 2019.", en: "Halloween 2019." },
        { name: "Frost Dragon", img: "frost_dragon.png" },
        { name: "Giraffe", img: "giraffe.png" },
        { name: "Owl", img: "owl.png" },
        { name: "Parrot", img: "parrot.png" },
        { name: "Evil Unicorn", img: "evil_unicorn.png" },
        { name: "Crow", img: "crow.png" },
        { name: "Turtle", img: "turtle.png" },
        { name: "Kangaroo", img: "kangaroo.png" },
        { name: "Frost Fury", img: "frost_fury.png" },
        { name: "Arctic Reindeer", img: "arctic_reindeer.png" },
        { name: "Albino Monkey", img: "albino_monkey.png" },
        { name: "Monkey King", img: "monkey_king.png" },
        // ВИПРАВЛЕНО НАЗВУ КАРТИНКИ ТУТ:
        { name: "Diamond Butterfly", img: "diamond_butterfly.png", ua: "Алмазний метелик.", ru: "Алмазная бабочка.", en: "Diamond Butterfly." },
        { name: "SS Bat Dragon", img: "winter_2022_strawberry_shortcake_bat_dragon.png" },
        { name: "Mechapup", img: "mechapup.png" },
        { name: "Hippogriff", img: "urban_2023_gargoyle.png" }, // Перевір назву файлу!
        { name: "Diamond Amazon", img: "diamond_amazon.png" },
        { name: "Nessie", img: "nessie.png" },
        { name: "Capricorn", img: "capricorn.png" },
        { name: "Balloon Unicorn", img: "balloon_unicorn.png" },
        { name: "Corn Doggo", img: "corn_doggo.png" },
        { name: "Gargoyle", img: "urban_2023_gargoyle.png" },
        { name: "Axolotl", img: "axolotl.png" },
        { name: "Cerberus", img: "cerberus.png" },
        { name: "Cobra", img: "cobra.png" },
        { name: "Diamond Dragon", img: "diamond_dragon.png" },
        { name: "Diamond Griffin", img: "diamond_griffin.png" },
        { name: "Diamond Unicorn", img: "diamond_unicorn.png" },
        { name: "Golden Dragon", img: "golden_dragon.png" },
        { name: "Golden Griffin", img: "golden_griffin.png" },
        { name: "Golden Unicorn", img: "golden_unicorn.png" },
        { name: "Dodo", img: "dodo.png" },
        { name: "Octopus", img: "octopus.png" },
        { name: "Shark", img: "shark.png" },
        { name: "Phoenix", img: "phoenix.png" },
        { name: "Peacock", img: "peacock.png" },
        { name: "Queen Bee", img: "queen_bee.png" },
        { name: "T-Rex", img: "trex.png" }
    ];

    function render() {
        const c = document.getElementById('petContainer');
        c.innerHTML = '';
        petData.forEach(p => {
            c.innerHTML += `
                <div class="pet-card" onclick="openModal('${p.name}')">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p style="color:#ffeaa7; font-weight:bold">${translations[currentLang].rarity}</p>
                </div>`;
        });
    }

    function openModal(name) {
        const p = petData.find(x => x.name === name);
        document.getElementById('modalImg').src = p.img;
        document.getElementById('modalName').innerText = p.name;
        document.getElementById('modalDesc').innerText = p[currentLang] || translations[currentLang].defDesc;
        document.getElementById('buyBtn').innerText = translations[currentLang].buy;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal(e) { if(!e || e.target.id === 'modalOverlay' || e.target.className === 'close-btn') document.getElementById('modalOverlay').style.display = 'none'; }

    function setLang(l) { 
        currentLang = l; 
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
        render(); 
    }

    setLang('ua');
</script>
</body>
</html>
